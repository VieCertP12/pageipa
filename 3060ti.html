<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ThaiSonCert Secured</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: { fontFamily: { sans: ['"Outfit"', 'sans-serif'] } }
            }
        }
    </script>
    <style> 
        .hidden { display: none !important; } 
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        /* Hiệu ứng cảnh báo */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake-anim { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <!-- LOGIN SCREEN -->
    <div id="login-box" class="fixed inset-0 z-50 flex items-center justify-center bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&w=1920&q=80');">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm"></div>
        <div class="relative w-full max-w-md p-8 bg-white rounded-3xl shadow-2xl border border-slate-700/50">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-indigo-600 to-purple-700 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-indigo-500/30 mb-4">
                    <i class="fas fa-shield-alt text-white text-3xl"></i>
                </div>
                <h2 class="text-3xl font-bold text-slate-800">Hệ Thống Quản Trị</h2>
                <p class="text-slate-500 text-sm mt-2 font-medium">Khu vực bảo mật cao cấp</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Email Quản Trị</label>
                    <div class="relative">
                        <span class="absolute left-4 top-4 text-slate-400"><i class="fas fa-envelope"></i></span>
                        <input type="email" id="adm-email" value="iamsonnk4@gmail.com" class="w-full pl-10 p-4 rounded-xl border border-slate-200 bg-slate-100 font-bold text-slate-600 focus:outline-none cursor-not-allowed" readonly>
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Mật khẩu truy cập</label>
                    <div class="relative">
                        <span class="absolute left-4 top-4 text-slate-400"><i class="fas fa-lock"></i></span>
                        <input type="password" id="adm-pass" placeholder="••••••••" class="w-full pl-10 p-4 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none font-medium">
                    </div>
                </div>
                <button id="btn-login" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/30 transition-all transform active:scale-95 flex justify-center items-center gap-2">
                    <i class="fas fa-sign-in-alt"></i> XÁC THỰC & ĐĂNG NHẬP
                </button>
            </div>
            <p id="err-msg" class="text-red-500 text-center mt-4 text-sm font-bold bg-red-50 py-3 rounded-lg border border-red-100 hidden flex items-center justify-center gap-2"><i class="fas fa-exclamation-circle"></i> <span>Thông báo lỗi</span></p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard" class="hidden min-h-screen pb-20">
        <!-- Top Nav -->
        <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-slate-200 shadow-sm">
            <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="w-9 h-9 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-lg flex items-center justify-center text-white shadow-md"><i class="fas fa-user-secret"></i></span>
                    <span class="font-bold text-xl tracking-tight text-slate-800">ThaiSon<span class="text-indigo-600">Secure</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="hidden md:inline-flex items-center gap-1 text-xs font-bold bg-green-100 text-green-700 px-3 py-1 rounded-full border border-green-200">
                        <i class="fas fa-shield-check"></i> Protected Mode
                    </span>
                    <button id="btn-logout" class="text-sm font-bold text-slate-500 hover:text-red-600 transition-colors flex items-center gap-2 bg-slate-100 hover:bg-red-50 px-3 py-1.5 rounded-lg">
                        <i class="fas fa-sign-out-alt"></i> Thoát
                    </button>
                </div>
            </div>
        </nav>

        <div class="max-w-5xl mx-auto px-4 mt-8 space-y-8">
            
            <!-- SECTION 1: CẤU HÌNH WEB -->
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden group hover:border-indigo-200 transition-colors">
                <div class="bg-slate-50/80 px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                    <h3 class="font-bold text-indigo-700 flex items-center gap-2">
                        <i class="fas fa-sliders-h"></i> Cấu Hình Giao Diện
                    </h3>
                    <div class="flex gap-2">
                        <span class="text-[10px] font-bold bg-indigo-50 text-indigo-600 px-2 py-1 rounded border border-indigo-100">LIVE EDIT</span>
                    </div>
                </div>
                <div class="p-6 grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Tiêu đề chính (H1)</label>
                        <input id="cfg-title" type="text" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="VD: SHARE CERTIFICATE">
                        <p class="text-[10px] text-slate-400 mt-1 flex items-center gap-1"><i class="fas fa-code"></i> Hỗ trợ mã màu HTML</p>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Mô tả phụ (Subtitle)</label>
                        <textarea id="cfg-subtitle" rows="1" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="VD: Kho tàng chứng chỉ ESign..."></textarea>
                    </div>
                </div>
                <div class="px-6 py-4 bg-slate-50/50 border-t border-slate-100 flex justify-end">
                    <button onclick="saveConfig()" id="btn-save-cfg" class="bg-slate-800 hover:bg-slate-900 text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-slate-900/10 transition-all flex items-center gap-2 transform active:scale-95">
                        <i class="fas fa-save"></i> Lưu Cấu Hình
                    </button>
                </div>
            </div>

            <!-- SECTION 2: QUẢN LÝ APP -->
            <div>
                <!-- Custom Tabs -->
                <div class="flex justify-center mb-6">
                    <div class="bg-white p-1.5 rounded-2xl shadow-sm border border-slate-200 inline-flex gap-2 select-none">
                        <button class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center gap-2" data-tab="esign" onclick="switchTab('esign')">
                            <i class="fas fa-feather-alt"></i> ESign
                        </button>
                        <button class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center gap-2" data-tab="cert" onclick="switchTab('cert')">
                            <i class="fas fa-certificate"></i> Cert
                        </button>
                        <button class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center gap-2" data-tab="mods" onclick="switchTab('mods')">
                            <i class="fas fa-gamepad"></i> Mods
                        </button>
                    </div>
                </div>

                <!-- Action Bar -->
                <div class="flex items-center justify-between mb-4 px-2">
                    <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2" id="tab-title">
                        <span>Quản Lý ESign</span>
                        <span id="count-badge" class="text-xs bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full">0</span>
                    </h2>
                    <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-indigo-500/30 transition-all flex items-center gap-2 hover:-translate-y-1">
                        <i class="fas fa-plus-circle"></i> Thêm Mới
                    </button>
                </div>

                <!-- Data Grid -->
                <div id="list-data" class="grid gap-3">
                    <!-- Loading Skeleton -->
                    <div class="animate-pulse flex space-x-4 bg-white p-4 rounded-xl border border-slate-200">
                        <div class="rounded-full bg-slate-200 h-12 w-12"></div>
                        <div class="flex-1 space-y-3 py-1">
                            <div class="h-2 bg-slate-200 rounded w-1/3"></div>
                            <div class="h-2 bg-slate-200 rounded w-1/4"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL EDIT/ADD -->
    <div id="modal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
            <div class="relative bg-white rounded-3xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:max-w-lg w-full scale-100">
                <!-- Modal Header -->
                <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-4 flex justify-between items-center">
                    <h3 class="text-lg leading-6 font-bold text-white flex items-center gap-2" id="modal-title"><i class="fas fa-edit"></i> Thêm Ứng Dụng Mới</h3>
                    <button onclick="closeModal()" class="text-indigo-100 hover:text-white transition bg-white/10 hover:bg-white/20 rounded-full w-8 h-8 flex items-center justify-center"><i class="fas fa-times"></i></button>
                </div>
                
                <!-- Modal Body -->
                <div class="px-6 py-6 space-y-4 max-h-[70vh] overflow-y-auto custom-scrollbar">
                    <input type="hidden" id="edit-id">
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Tên Ứng Dụng <span class="text-red-500">*</span></label>
                        <input id="inp-name" type="text" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-slate-700 bg-slate-50 focus:bg-white transition" placeholder="Ví dụ: ESign China">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Mô tả ngắn</label>
                        <input id="inp-desc" type="text" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm" placeholder="Mô tả chức năng...">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Link Tải / Web <span class="text-red-500">*</span></label>
                        <div class="relative group">
                            <span class="absolute left-3 top-3.5 text-slate-400 group-focus-within:text-indigo-500 transition-colors"><i class="fas fa-link"></i></span>
                            <input id="inp-url" type="text" class="w-full pl-9 p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-mono text-indigo-600 bg-slate-50 focus:bg-white transition" placeholder="https://...">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Link Icon (Ảnh)</label>
                        <div class="flex gap-3">
                            <input id="inp-icon" type="text" class="flex-1 p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm" placeholder="https://imgur.com/..." oninput="previewIcon(this.value)">
                            <div class="w-12 h-12 rounded-lg border border-slate-200 bg-slate-50 flex items-center justify-center overflow-hidden shrink-0 shadow-sm">
                                <img id="icon-preview" src="" class="w-full h-full object-cover hidden">
                                <i id="icon-placeholder" class="fas fa-image text-slate-300"></i>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nhãn (Badge)</label>
                            <div class="relative">
                                <select id="inp-badge" class="w-full p-3 border border-slate-200 rounded-xl bg-white appearance-none focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-slate-600 cursor-pointer">
                                    <option value="">Không có</option>
                                    <option value="HOT">🔥 HOT</option>
                                    <option value="NEW">✨ NEW</option>
                                    <option value="GOOD">👍 GOOD</option>
                                </select>
                                <span class="absolute right-3 top-3.5 text-slate-400 pointer-events-none"><i class="fas fa-chevron-down"></i></span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Trạng thái</label>
                            <div class="relative">
                                <select id="inp-status" class="w-full p-3 border border-slate-200 rounded-xl bg-white appearance-none focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-slate-600 cursor-pointer">
                                    <option value="active">🟢 Hiện (Active)</option>
                                    <option value="hidden">🔴 Ẩn (Hidden)</option>
                                </select>
                                <span class="absolute right-3 top-3.5 text-slate-400 pointer-events-none"><i class="fas fa-eye"></i></span>
                            </div>
                        </div>
                    </div>

                    <div id="div-tag" class="hidden p-3 bg-orange-50 rounded-xl border border-orange-100">
                        <label class="block text-xs font-bold text-orange-600 uppercase mb-2">Icon Tag (Chỉ cho Mods)</label>
                        <div class="flex justify-around">
                            <label class="cursor-pointer flex flex-col items-center gap-1 group">
                                <input type="radio" name="tag_icon" value="fire" class="accent-orange-500 w-4 h-4" checked>
                                <i class="fas fa-fire text-orange-500 text-xl group-hover:scale-110 transition"></i>
                            </label>
                            <label class="cursor-pointer flex flex-col items-center gap-1 group">
                                <input type="radio" name="tag_icon" value="bolt" class="accent-yellow-500 w-4 h-4">
                                <i class="fas fa-bolt text-yellow-500 text-xl group-hover:scale-110 transition"></i>
                            </label>
                            <label class="cursor-pointer flex flex-col items-center gap-1 group">
                                <input type="radio" name="tag_icon" value="star" class="accent-purple-500 w-4 h-4">
                                <i class="fas fa-star text-purple-500 text-xl group-hover:scale-110 transition"></i>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Modal Footer -->
                <div class="bg-slate-50 px-6 py-4 flex justify-end gap-3 border-t border-slate-100">
                    <button onclick="closeModal()" class="px-5 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-200 transition">Hủy</button>
                    <button id="btn-save" class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold shadow-lg shadow-indigo-500/20 transition-all flex items-center gap-2 hover:scale-105 active:scale-95">
                        <i class="fas fa-check"></i> Lưu Dữ Liệu
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, setDoc, getDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgSBKuu7hdpbMj5B6EKuHkAI1EmmvJxVc",
            authDomain: "sharechungchi.firebaseapp.com",
            projectId: "sharechungchi",
            storageBucket: "sharechungchi.firebasestorage.app",
            messagingSenderId: "39399207872",
            appId: "1:39399207872:web:087afb400ef0be078b0e25"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- ADMIN EMAIL CONFIG ---
        const ADMIN_EMAIL = "iamsonnk4@gmail.com";

        let curType = 'esign';
        let allData = [];

        // Auth Logic - SECURE CHECK (Real-time monitoring)
        onAuthStateChanged(auth, async (u) => {
            if(u) {
                // Kiểm tra email cứng (Layer 1 Security)
                if(u.email !== ADMIN_EMAIL) {
                    await signOut(auth);
                    const err = document.getElementById('err-msg');
                    err.innerHTML = `<i class="fas fa-ban"></i> TÀI KHOẢN KHÔNG CÓ QUYỀN TRUY CẬP!`;
                    err.classList.remove('hidden');
                    document.getElementById('login-box').classList.add('shake-anim');
                    return;
                }

                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadConfig();
                load();
                switchTab('esign'); // Init tab UI
            } else {
                document.getElementById('login-box').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }
        });

        document.getElementById('btn-login').addEventListener('click', () => {
            const p = document.getElementById('adm-pass').value;
            const btn = document.getElementById('btn-login');
            const err = document.getElementById('err-msg');
            
            // Basic Spam Block (Layer 0 Security)
            if(!p) {
                err.innerText = "Vui lòng nhập mật khẩu!";
                err.classList.remove('hidden');
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xác thực...';
            btn.disabled = true;
            err.classList.add('hidden');
            
            signInWithEmailAndPassword(auth, ADMIN_EMAIL, p)
            .catch(e => {
                err.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Sai mật khẩu hoặc lỗi kết nối!`;
                err.classList.remove('hidden');
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> XÁC THỰC & ĐĂNG NHẬP';
                btn.disabled = false;
                document.getElementById('login-box').classList.add('shake-anim');
                setTimeout(() => document.getElementById('login-box').classList.remove('shake-anim'), 500);
            });
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // --- Config Logic ---
        async function loadConfig() {
            try {
                const s = await getDoc(doc(db, "settings", "general"));
                if(s.exists()) {
                    const d = s.data();
                    document.getElementById('cfg-title').value = d.title || "";
                    document.getElementById('cfg-subtitle').value = d.subtitle || "";
                }
            } catch(e) {}
        }
        
        window.saveConfig = async () => {
            const btn = document.getElementById('btn-save-cfg');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang lưu...';
            btn.disabled = true;
            
            try {
                // Kiểm tra lại quyền trước khi lưu (Client-side Double Check)
                if(auth.currentUser?.email !== ADMIN_EMAIL) throw new Error("Mất quyền truy cập!");

                await setDoc(doc(db, "settings", "general"), {
                    title: document.getElementById('cfg-title').value,
                    subtitle: document.getElementById('cfg-subtitle').value
                });
                btn.className = "bg-green-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg transition-all flex items-center gap-2";
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Đã Lưu!';
                setTimeout(() => {
                    btn.className = "bg-slate-800 hover:bg-slate-900 text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-slate-900/10 transition-all flex items-center gap-2";
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                }, 2000);
            } catch(e) { 
                alert("Lỗi: " + e.message); 
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }

        // --- Core App Logic ---
        async function load() {
            try {
                const q = query(collection(db, "apps"));
                const s = await getDocs(q);
                allData = [];
                s.forEach(d => allData.push({id: d.id, ...d.data()}));
                // Sort newest first
                allData.sort((a,b) => (b.updatedAt || "").localeCompare(a.updatedAt || ""));
                render();
            } catch(e) { console.error(e); }
        }

        function render() {
            const list = allData.filter(i => i.type === curType);
            const container = document.getElementById('list-data');
            document.getElementById('count-badge').innerText = list.length;
            
            if(list.length === 0) {
                container.innerHTML = `<div class="text-center py-16 bg-white rounded-2xl border border-slate-200 border-dashed">
                    <div class="inline-block p-4 rounded-full bg-slate-50 mb-3"><i class="fas fa-box-open text-4xl text-slate-300"></i></div>
                    <p class="text-slate-500 font-medium">Chưa có ứng dụng nào trong mục này.</p>
                    <button onclick="openModal()" class="mt-4 text-indigo-600 font-bold text-sm hover:underline">Thêm ngay</button>
                </div>`;
                return;
            }

            container.innerHTML = list.map(i => `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-all flex items-center gap-4 group ${i.status==='hidden'?'opacity-60 grayscale bg-slate-50 ring-1 ring-slate-200':''}">
                    <div class="relative w-14 h-14 rounded-xl bg-slate-100 overflow-hidden shrink-0 border border-slate-200 group-hover:border-indigo-300 transition-colors">
                        <img src="${i.icon || 'https://i.imgur.com/L6HpZa6.png'}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100?text=Icon'">
                    </div>
                    
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                            <h4 class="font-bold text-slate-800 truncate text-base group-hover:text-indigo-600 transition-colors">${i.name}</h4>
                            ${i.badge ? `<span class="bg-red-100 text-red-600 text-[10px] font-extrabold px-2 py-0.5 rounded-full uppercase border border-red-200 shadow-sm">${i.badge}</span>` : ''}
                            ${i.status==='hidden' ? `<span class="bg-slate-200 text-slate-600 text-[10px] font-bold px-2 py-0.5 rounded-full"><i class="fas fa-eye-slash mr-1"></i> ẨN</span>` : ''}
                        </div>
                        <p class="text-xs text-slate-500 truncate mt-1 flex items-center gap-1"><i class="fas fa-info-circle text-slate-300"></i> ${i.desc || 'Chưa có mô tả'}</p>
                        <div class="flex gap-4 mt-2 text-[11px] font-medium text-slate-400">
                            <span class="flex items-center gap-1 bg-slate-50 px-2 py-0.5 rounded border border-slate-100"><i class="fas fa-download text-indigo-400"></i> ${i.downloads||0}</span>
                            ${i.tag ? `<span class="flex items-center gap-1 capitalize bg-orange-50 px-2 py-0.5 rounded border border-orange-100 text-orange-500"><i class="fas fa-${i.tag}"></i> ${i.tag}</span>` : ''}
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="window.edit('${i.id}')" class="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white transition flex items-center justify-center shadow-sm hover:shadow-md" title="Chỉnh sửa">
                            <i class="fas fa-pen text-sm"></i>
                        </button>
                        <button onclick="window.del('${i.id}')" class="w-10 h-10 rounded-xl bg-red-50 text-red-600 hover:bg-red-600 hover:text-white transition flex items-center justify-center shadow-sm hover:shadow-md" title="Xóa bỏ">
                            <i class="fas fa-trash text-sm"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // --- UI FUNCTIONS ---
        window.switchTab = (t) => {
            curType = t;
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if(btn.dataset.tab === t) {
                    btn.className = "tab-btn px-6 py-2.5 rounded-xl text-sm font-bold bg-indigo-600 text-white shadow-lg shadow-indigo-500/30 transition-all transform scale-105 flex items-center gap-2";
                } else {
                    btn.className = "tab-btn px-6 py-2.5 rounded-xl text-sm font-bold bg-white text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition-all flex items-center gap-2 border border-transparent hover:border-slate-200";
                }
            });

            const titles = { 'esign': 'Quản Lý ESign', 'cert': 'Quản Lý Cert', 'mods': 'Quản Lý Mods' };
            document.getElementById('tab-title').innerHTML = `<span>${titles[t]}</span> <span id="count-badge" class="text-xs bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full ml-2">...</span>`;

            if(t==='mods') document.getElementById('div-tag').classList.remove('hidden'); 
            else document.getElementById('div-tag').classList.add('hidden');
            
            render();
        }

        window.previewIcon = (url) => {
            const img = document.getElementById('icon-preview');
            const place = document.getElementById('icon-placeholder');
            if(url) {
                img.src = url;
                img.classList.remove('hidden');
                place.classList.add('hidden');
                // Auto error handler
                img.onerror = () => {
                    img.classList.add('hidden');
                    place.classList.remove('hidden');
                }
            } else {
                img.classList.add('hidden');
                place.classList.remove('hidden');
            }
        }

        window.openModal = () => {
            document.getElementById('edit-id').value = '';
            document.getElementById('inp-name').value = '';
            document.getElementById('inp-desc').value = '';
            document.getElementById('inp-url').value = '';
            document.getElementById('inp-icon').value = '';
            document.getElementById('inp-badge').value = '';
            document.getElementById('inp-status').value = 'active';
            window.previewIcon('');
            
            document.getElementById('modal-title').innerHTML = `<i class="fas fa-plus-circle"></i> Thêm Mới ${curType.toUpperCase()}`;
            document.getElementById('modal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        window.edit = (id) => {
            const item = allData.find(x => x.id === id);
            if(!item) return;
            
            document.getElementById('edit-id').value = id;
            document.getElementById('inp-name').value = item.name;
            document.getElementById('inp-desc').value = item.desc;
            document.getElementById('inp-url').value = item.url;
            document.getElementById('inp-icon').value = item.icon || '';
            document.getElementById('inp-badge').value = item.badge || '';
            document.getElementById('inp-status').value = item.status || 'active';
            window.previewIcon(item.icon);

            if(item.tag) {
                const radio = document.querySelector(`input[name="tag_icon"][value="${item.tag}"]`);
                if(radio) radio.checked = true;
            }

            document.getElementById('modal-title').innerHTML = `<i class="fas fa-edit"></i> Chỉnh Sửa Ứng Dụng`;
            document.getElementById('modal').classList.remove('hidden');
        };

        window.del = async (id) => {
            if(confirm("CẢNH BÁO:\n\nBạn có chắc chắn muốn xóa vĩnh viễn ứng dụng này không?\nHành động này không thể hoàn tác!")) {
                try {
                    await deleteDoc(doc(db, "apps", id));
                    load();
                } catch(e) { alert("Lỗi xóa: " + e.message); }
            }
        };

        document.getElementById('btn-save').addEventListener('click', async () => {
            const name = document.getElementById('inp-name').value;
            const url = document.getElementById('inp-url').value;
            
            if(!name || !url) {
                alert("Vui lòng nhập Tên và Link tải!");
                return;
            }

            const btn = document.getElementById('btn-save'); 
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang lưu...';
            btn.disabled = true;

            try {
                // Bảo mật bổ sung: Kiểm tra email lần nữa trước khi gửi
                if(auth.currentUser?.email !== ADMIN_EMAIL) throw new Error("Phiên làm việc không hợp lệ!");

                const id = document.getElementById('edit-id').value;
                
                let selectedTag = 'fire';
                const tagRadio = document.querySelector('input[name="tag_icon"]:checked');
                if(tagRadio) selectedTag = tagRadio.value;

                const data = {
                    type: curType,
                    name: name,
                    desc: document.getElementById('inp-desc').value,
                    url: url,
                    icon: document.getElementById('inp-icon').value,
                    badge: document.getElementById('inp-badge').value,
                    status: document.getElementById('inp-status').value,
                    tag: selectedTag,
                    updatedAt: new Date().toISOString()
                };
                
                if(!id) data.downloads = 0; 

                const docId = id || (curType[0] + Date.now());
                await setDoc(doc(db, "apps", docId), data, { merge: true });
                
                closeModal();
                load();
            } catch(e) {
                alert("Lỗi lưu dữ liệu: " + e.message + "\n(Vui lòng kiểm tra quyền Admin hoặc kết nối mạng)");
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

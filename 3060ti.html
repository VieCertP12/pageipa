<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ThaiSonCert Pro</title>
    <!-- BẢO MẬT: CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data:; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src https://cdnjs.cloudflare.com https://fonts.gstatic.com;">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    fontFamily: { sans: ['"Outfit"', 'sans-serif'] },
                    animation: {
                        'slide-in': 'slideIn 0.3s ease-out forwards',
                        'fade-out': 'fadeOut 0.3s ease-in forwards',
                    },
                    keyframes: {
                        slideIn: { '0%': { transform: 'translateX(100%)', opacity: '0' }, '100%': { transform: 'translateX(0)', opacity: '1' } },
                        fadeOut: { '0%': { opacity: '1' }, '100%': { opacity: '0' } }
                    }
                }
            }
        }
    </script>
    <style> 
        .hidden { display: none !important; } 
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .shake-anim { animation: shake 0.3s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <!-- TOAST CONTAINER (Thông báo nổi) -->

    <!-- LOGIN SCREEN -->

                                <span class="text-[10px] font-bold text-slate-400 uppercase">Hot</span>

    <!-- LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, setDoc, getDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgSBKuu7hdpbMj5B6EKuHkAI1EmmvJxVc",
            authDomain: "sharechungchi.firebaseapp.com",
            projectId: "sharechungchi",
            storageBucket: "sharechungchi.firebasestorage.app",
            messagingSenderId: "39399207872",
            appId: "1:39399207872:web:087afb400ef0be078b0e25"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- TOAST NOTIFICATION FUNCTION ---
        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const colors = type === 'success' 
                ? 'bg-white border-l-4 border-green-500 text-slate-700' 
                : 'bg-white border-l-4 border-red-500 text-red-600';
            
            const icon = type === 'success' 
                ? '<i class="fas fa-check-circle text-green-500 text-xl"></i>' 
                : '<i class="fas fa-exclamation-circle text-red-500 text-xl"></i>';

            toast.className = `p-4 rounded-lg shadow-xl flex items-center gap-3 min-w-[300px] pointer-events-auto animate-slide-in ${colors}`;
            toast.innerHTML = `
                ${icon}
                <div class="flex-1">
                    <h4 class="font-bold text-sm uppercase">${type === 'success' ? 'Thành công' : 'Lỗi'}</h4>
                    <p class="text-sm font-medium opacity-90">${msg}</p>
                </div>
            `;

            container.appendChild(toast);

            // Auto remove
            setTimeout(() => {
                toast.classList.remove('animate-slide-in');
                toast.classList.add('animate-fade-out');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // BẢO MẬT: Escape HTML
        const escapeHtml = (unsafe) => {
            if (typeof unsafe !== 'string') return unsafe;
            return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // BẢO MẬT: Auto Logout
        let idleTimer;
        function resetIdleTimer() {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                if(auth.currentUser) {
                    signOut(auth);
                    alert("⚠️ Phiên làm việc đã hết hạn. Vui lòng đăng nhập lại!");
                }
            }, 15 * 60 * 1000);
        }
        window.addEventListener('mousemove', resetIdleTimer);
        window.addEventListener('keypress', resetIdleTimer);
        window.addEventListener('click', resetIdleTimer);

        let curType = 'esign';
        let allData = [];

        // Auth Check
        onAuthStateChanged(auth, async (u) => {
            if(u) {
                try {
                    await getDoc(doc(db, "settings", "general")); // Test permission
                    document.getElementById('login-box').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    loadConfig();
                    load();
                    switchTab('esign');
                    resetIdleTimer();
                    showToast("Chào mừng Admin quay trở lại!");
                } catch (e) {
                    await signOut(auth);
                    const err = document.getElementById('err-msg');
                    err.innerHTML = `<i class="fas fa-ban"></i> TÀI KHOẢN KHÔNG HỢP LỆ!`;
                    err.classList.remove('hidden');
                    document.getElementById('login-box').classList.add('shake-anim');
                }
            } else {
                document.getElementById('login-box').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }
        });

        document.getElementById('btn-login').addEventListener('click', () => {
            const email = document.getElementById('adm-email').value;
            const p = document.getElementById('adm-pass').value;
            const btn = document.getElementById('btn-login');
            const err = document.getElementById('err-msg');
            
            if(!email || !p) {
                showToast("Vui lòng nhập Email và Mật khẩu", "error");
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xác thực...';
            btn.disabled = true;
            err.classList.add('hidden');
            
            signInWithEmailAndPassword(auth, email, p)
            .catch(e => {
                err.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Sai thông tin hoặc lỗi kết nối!`;
                err.classList.remove('hidden');
                btn.innerHTML = '<span>ĐĂNG NHẬP</span> <i class="fas fa-arrow-right"></i>';
                btn.disabled = false;
                document.getElementById('login-box').classList.add('shake-anim');
                setTimeout(() => document.getElementById('login-box').classList.remove('shake-anim'), 500);
            });
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // --- Config Logic ---
        async function loadConfig() {
            try {
                const s = await getDoc(doc(db, "settings", "general"));
                if(s.exists()) {
                    const d = s.data();
                    document.getElementById('cfg-title').value = d.title || "";
                    document.getElementById('cfg-subtitle').value = d.subtitle || "";
                }
            } catch(e) {}
        }
        
        window.saveConfig = async () => {
            const btn = document.getElementById('btn-save-cfg');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang lưu...';
            btn.disabled = true;
            
            try {
                await setDoc(doc(db, "settings", "general"), {
                    title: document.getElementById('cfg-title').value,
                    subtitle: escapeHtml(document.getElementById('cfg-subtitle').value)
                });
                showToast("Đã lưu cấu hình giao diện!");
            } catch(e) { 
                showToast("Lỗi: " + e.message, "error"); 
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }

        // --- Core App Logic ---
        async function load() {
            try {
                const q = query(collection(db, "apps"));
                const s = await getDocs(q);
                allData = [];
                s.forEach(d => allData.push({id: d.id, ...d.data()}));
                allData.sort((a,b) => (b.updatedAt || "").localeCompare(a.updatedAt || ""));
                render();
            } catch(e) { console.error(e); }
        }

        function render() {
            const searchTerm = document.getElementById('search-app').value.toLowerCase();
            const list = allData.filter(i => {
                const matchType = i.type === curType;
                const matchSearch = i.name.toLowerCase().includes(searchTerm) || (i.desc && i.desc.toLowerCase().includes(searchTerm));
                return matchType && matchSearch;
            });

            const container = document.getElementById('list-data');
            document.getElementById('count-badge').innerText = `${list.length} App`;
            
            if(list.length === 0) {
                container.innerHTML = `<div class="text-center py-16 bg-white rounded-[2rem] border border-slate-100 border-dashed">
                    <div class="inline-block p-4 rounded-full bg-slate-50 mb-3"><i class="fas fa-box-open text-4xl text-slate-300"></i></div>
                    <p class="text-slate-500 font-medium">Không tìm thấy dữ liệu.</p>
                    <button onclick="openModal()" class="mt-4 text-indigo-600 font-bold text-sm hover:underline">Thêm mới ngay</button>
                </div>`;
                return;
            }

            container.innerHTML = list.map(i => `
                <div class="bg-white p-4 rounded-[1.25rem] border border-slate-100 shadow-sm hover:shadow-lg transition-all flex items-center gap-4 group hover:-translate-y-1 duration-300 ${i.status==='hidden'?'opacity-60 grayscale bg-slate-50 ring-1 ring-slate-200':''}">
                    <div class="relative w-16 h-16 rounded-2xl bg-slate-100 overflow-hidden shrink-0 border border-slate-200 group-hover:border-indigo-300 transition-colors p-0.5">
                        <img src="${escapeHtml(i.icon) || 'https://i.imgur.com/L6HpZa6.png'}" class="w-full h-full object-cover rounded-xl" onerror="this.src='https://placehold.co/100?text=Icon'">
                    </div>
                    
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                            <h4 class="font-bold text-slate-800 truncate text-base group-hover:text-indigo-600 transition-colors">${escapeHtml(i.name)}</h4>
                            ${i.badge ? `<span class="bg-red-50 text-red-600 text-[9px] font-extrabold px-2 py-0.5 rounded-full uppercase border border-red-100 shadow-sm tracking-wider">${escapeHtml(i.badge)}</span>` : ''}
                            ${i.status==='hidden' ? `<span class="bg-slate-200 text-slate-600 text-[9px] font-bold px-2 py-0.5 rounded-full uppercase"><i class="fas fa-eye-slash mr-1"></i> ẨN</span>` : ''}
                        </div>
                        <p class="text-xs text-slate-500 truncate mt-1 flex items-center gap-1 font-medium opacity-80">${escapeHtml(i.desc) || 'Chưa có mô tả'}</p>
                        <div class="flex gap-4 mt-2.5 text-[11px] font-bold text-slate-400">
                            <span class="flex items-center gap-1.5 bg-slate-50 px-2.5 py-1 rounded-lg border border-slate-100 group-hover:bg-indigo-50 group-hover:text-indigo-500 transition-colors"><i class="fas fa-download"></i> ${i.downloads||0}</span>
                            ${i.tag ? `<span class="flex items-center gap-1 capitalize bg-orange-50 px-2 py-0.5 rounded-lg border border-orange-100 text-orange-500"><i class="fas fa-${escapeHtml(i.tag)}"></i> ${escapeHtml(i.tag)}</span>` : ''}
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="window.edit('${i.id}')" class="w-10 h-10 rounded-xl bg-slate-50 text-indigo-600 hover:bg-indigo-600 hover:text-white transition-all flex items-center justify-center shadow-sm hover:shadow-indigo-500/30" title="Chỉnh sửa">
                            <i class="fas fa-pen text-sm"></i>
                        </button>
                        <button onclick="window.del('${i.id}')" class="w-10 h-10 rounded-xl bg-slate-50 text-red-500 hover:bg-red-500 hover:text-white transition-all flex items-center justify-center shadow-sm hover:shadow-red-500/30" title="Xóa bỏ">
                            <i class="fas fa-trash text-sm"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // --- SEARCH LISTENER ---
        document.getElementById('search-app').addEventListener('input', render);

        // --- UI FUNCTIONS ---
        window.switchTab = (t) => {
            curType = t;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if(btn.dataset.tab === t) {
                    btn.className = "tab-btn px-8 py-3 rounded-xl text-sm font-bold bg-indigo-600 text-white shadow-lg shadow-indigo-500/30 transition-all transform scale-105 flex items-center gap-2 z-10 relative";
                } else {
                    btn.className = "tab-btn px-6 py-3 rounded-xl text-sm font-bold bg-white text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition-all flex items-center gap-2 border border-transparent opacity-70 hover:opacity-100";
                }
            });
            
            const titles = { 'esign': 'Quản Lý ESign', 'cert': 'Quản Lý Cert', 'mods': 'Quản Lý Mods' };
            // document.getElementById('tab-title').innerHTML = ... (handled in render)

            if(t==='mods') document.getElementById('div-tag').classList.remove('hidden'); 
            else document.getElementById('div-tag').classList.add('hidden');
            
            render();
        }

        window.previewIcon = (url) => {
            const img = document.getElementById('icon-preview');
            const place = document.getElementById('icon-placeholder');
            if(url) {
                img.src = url; 
                img.classList.remove('hidden');
                place.classList.add('hidden');
                img.onerror = () => { img.classList.add('hidden'); place.classList.remove('hidden'); }
            } else {
                img.classList.add('hidden');
                place.classList.remove('hidden');
            }
        }

        window.openModal = () => {
            document.getElementById('edit-id').value = '';
            document.getElementById('inp-name').value = '';
            document.getElementById('inp-desc').value = '';
            document.getElementById('inp-url').value = '';
            document.getElementById('inp-icon').value = '';
            document.getElementById('inp-badge').value = '';
            document.getElementById('inp-status').value = 'active';
            window.previewIcon('');
            
            document.getElementById('modal-title').innerHTML = `<i class="fas fa-plus-circle text-indigo-600"></i> Thêm Mới ${curType.toUpperCase()}`;
            document.getElementById('modal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        window.edit = (id) => {
            const item = allData.find(x => x.id === id);
            if(!item) return;
            
            document.getElementById('edit-id').value = id;
            document.getElementById('inp-name').value = item.name;
            document.getElementById('inp-desc').value = item.desc;
            document.getElementById('inp-url').value = item.url;
            document.getElementById('inp-icon').value = item.icon || '';
            document.getElementById('inp-badge').value = item.badge || '';
            document.getElementById('inp-status').value = item.status || 'active';
            window.previewIcon(item.icon);

            if(item.tag) {
                const radio = document.querySelector(`input[name="tag_icon"][value="${item.tag}"]`);
                if(radio) radio.checked = true;
            }

            document.getElementById('modal-title').innerHTML = `<i class="fas fa-edit text-indigo-600"></i> Chỉnh Sửa Ứng Dụng`;
            document.getElementById('modal').classList.remove('hidden');
        };

        window.del = async (id) => {
            if(confirm("⚠️ CẢNH BÁO XÓA:\n\nBạn có chắc chắn muốn xóa không?")) {
                try {
                    await deleteDoc(doc(db, "apps", id));
                    showToast("Đã xóa ứng dụng thành công!");
                    load();
                } catch(e) { showToast("Lỗi xóa: " + e.message, "error"); }
            }
        };

        document.getElementById('btn-save').addEventListener('click', async () => {
            const name = document.getElementById('inp-name').value;
            const url = document.getElementById('inp-url').value;
            
            if(!name || !url) {
                showToast("Vui lòng nhập Tên và Link tải!", "error");
                return;
            }

            const btn = document.getElementById('btn-save'); 
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang lưu...';
            btn.disabled = true;

            try {
                const id = document.getElementById('edit-id').value;
                let selectedTag = 'fire';
                const tagRadio = document.querySelector('input[name="tag_icon"]:checked');
                if(tagRadio) selectedTag = tagRadio.value;

                const data = {
                    type: curType,
                    name: name,
                    desc: document.getElementById('inp-desc').value,
                    url: url,
                    icon: document.getElementById('inp-icon').value,
                    badge: document.getElementById('inp-badge').value,
                    status: document.getElementById('inp-status').value,
                    tag: selectedTag,
                    updatedAt: new Date().toISOString()
                };
                
                if(!id) data.downloads = 0; 

                const docId = id || (curType[0] + Date.now());
                await setDoc(doc(db, "apps", docId), data, { merge: true });
                
                closeModal();
                showToast(id ? "Cập nhật thành công!" : "Thêm mới thành công!");
                load();
            } catch(e) {
                showToast("Lỗi: " + e.message, "error");
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

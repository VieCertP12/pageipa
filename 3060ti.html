<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ThaiSonCert Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['"Outfit"', 'sans-serif'] } } } }</script>
    <style> 
        .hidden { display: none !important; } 
        .draggable-item.dragging { opacity: 0.5; border: 2px dashed #6366f1; background: #eef2ff; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .icon-preview-box svg, .icon-preview-box img { width: 100%; height: 100%; object-fit: cover; }
        .icon-preview-box i { font-size: 1.25rem; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div id="toast-container" class="fixed top-20 right-5 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <div id="login-box" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900">
        <div class="w-full max-w-md p-8 bg-white rounded-3xl shadow-2xl text-center">
            <h2 class="text-3xl font-black mb-8">Admin<span class="text-indigo-600">Portal</span></h2>
            <input type="email" id="adm-email" placeholder="Email" class="w-full p-4 mb-4 rounded-xl border border-slate-200 bg-slate-50">
            <input type="password" id="adm-pass" placeholder="Password" class="w-full p-4 mb-6 rounded-xl border border-slate-200 bg-slate-50">
            <button id="btn-login" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition">ĐĂNG NHẬP</button>
            <p id="err-msg" class="text-red-500 mt-4 text-sm font-bold hidden"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden min-h-screen pb-20">
        <nav class="bg-white sticky top-0 z-40 border-b border-slate-200 shadow-sm px-4 h-16 flex items-center justify-between">
            <span class="font-bold text-xl">ThaiSon<span class="text-indigo-600">Admin</span></span>
            <button id="btn-logout" class="text-sm font-bold text-slate-500 hover:text-red-500"><i class="fas fa-power-off"></i> Thoát</button>
        </nav>

        <div class="max-w-6xl mx-auto px-4 mt-8 space-y-8">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 px-6 py-4 border-b border-slate-100 cursor-pointer" onclick="document.getElementById('config-body').classList.toggle('hidden');"><h3 class="font-bold text-slate-700"><i class="fas fa-palette text-indigo-500"></i> Cấu Hình Giao Diện</h3></div>
                <div id="config-body" class="p-6 hidden space-y-6">
                    <div class="grid md:grid-cols-2 gap-6">
                        <div><label class="block text-xs font-bold text-slate-400 uppercase mb-2">Tiêu đề (H1)</label><div class="flex gap-2"><input id="cfg-title" class="flex-1 p-3 border rounded-xl"><input id="cfg-title-color" type="color" class="w-12 h-12 p-1 border rounded-xl bg-white cursor-pointer"></div></div>
                        <div><label class="block text-xs font-bold text-slate-400 uppercase mb-2">Mô tả (Subtitle)</label><div class="flex gap-2"><textarea id="cfg-subtitle" rows="1" class="flex-1 p-3 border rounded-xl resize-none"></textarea><input id="cfg-subtitle-color" type="color" class="w-12 h-12 p-1 border rounded-xl bg-white cursor-pointer"></div></div>
                    </div>
                    <div class="border-t pt-4"><h4 class="font-bold text-sm text-slate-600 mb-4">CẤU HÌNH 3 NÚT</h4><div id="buttons-config-area" class="grid md:grid-cols-3 gap-4"></div></div>
                    <div class="flex justify-end pt-2"><button onclick="saveConfig()" id="btn-save-cfg" class="bg-slate-800 text-white px-6 py-2.5 rounded-xl font-bold text-sm"><i class="fas fa-save"></i> Lưu Cấu Hình</button></div>
                </div>
            </div>

            <div>
                <div class="flex justify-center mb-8">
                    <div class="bg-white p-1.5 rounded-2xl shadow-sm border border-slate-200 inline-flex gap-1">
                        <button class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold transition-all" data-tab="esign" onclick="switchTab('esign')">ESign</button>
                        <button class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold transition-all" data-tab="cert" onclick="switchTab('cert')">Cert</button>
                        <button class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold transition-all" data-tab="mods" onclick="switchTab('mods')">Mods</button>
                    </div>
                </div>

                <div class="flex items-center justify-between mb-6 gap-4">
                    <div class="flex items-center gap-3"><h2 class="text-2xl font-black text-slate-800">Quản Lý</h2><span id="count-badge" class="text-xs bg-indigo-100 text-indigo-700 font-bold px-2.5 py-1 rounded-lg">0 App</span></div>
                    <div class="flex gap-3">
                        <input type="text" id="search-app" placeholder="Tìm kiếm..." class="pl-4 pr-4 py-2.5 rounded-xl border border-slate-200 text-sm outline-none w-48 focus:w-64 transition-all">
                        <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-bold text-sm whitespace-nowrap"><i class="fas fa-plus"></i> Thêm</button>
                    </div>
                </div>
                <div class="mb-2 text-xs text-slate-400 italic text-right">* Kéo thả để sắp xếp (Không khả dụng khi đang tìm kiếm)</div>
                <div id="list-data" class="grid gap-3"></div>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="flex items-center justify-center min-h-screen px-4">
            <div class="relative bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden animate-[slideIn_0.2s_ease-out]">
                <div class="bg-slate-50 px-6 py-4 flex justify-between items-center border-b border-slate-100"><h3 class="font-bold text-slate-800" id="modal-title"></h3><button onclick="closeModal()"><i class="fas fa-times text-slate-400"></i></button></div>
                <div class="p-6 space-y-4 max-h-[70vh] overflow-y-auto">
                    <input type="hidden" id="edit-id">
                    <input id="inp-name" type="text" class="w-full p-3 border rounded-xl" placeholder="Tên App">
                    <input id="inp-desc" type="text" class="w-full p-3 border rounded-xl" placeholder="Mô tả">
                    <input id="inp-url" type="text" class="w-full p-3 border rounded-xl" placeholder="Link Tải">
                    <div class="relative"><label class="absolute -top-2 left-3 bg-white px-1 text-xs font-bold text-indigo-600">Lượt Tải</label><input id="inp-downloads" type="number" class="w-full p-3 border rounded-xl border-indigo-200" placeholder="0"></div>
                    <div class="flex gap-2"><input id="inp-icon" type="text" class="flex-1 p-3 border rounded-xl" placeholder="Link Icon / SVG" oninput="previewIcon(this.value)"><div id="icon-preview" class="icon-preview-box w-12 h-12 rounded-lg border bg-slate-100 overflow-hidden flex items-center justify-center"></div></div>
                    <div class="grid grid-cols-2 gap-4"><select id="inp-badge" class="w-full p-3 border rounded-xl"><option value="">Không Badge</option><option value="HOT">HOT</option><option value="NEW">NEW</option></select><select id="inp-status" class="w-full p-3 border rounded-xl"><option value="active">Hiện</option><option value="hidden">Ẩn</option></select></div>
                </div>
                <div class="bg-slate-50 px-6 py-4 flex justify-end gap-3 border-t border-slate-100"><button onclick="closeModal()" class="px-4 py-2 rounded-xl text-slate-500 font-bold">Hủy</button><button id="btn-save" class="px-6 py-2 bg-indigo-600 text-white rounded-xl font-bold">Lưu</button></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, setDoc, getDoc, deleteDoc, query, writeBatch, orderBy } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCgSBKuu7hdpbMj5B6EKuHkAI1EmmvJxVc", authDomain: "sharechungchi.firebaseapp.com", projectId: "sharechungchi", storageBucket: "sharechungchi.firebasestorage.app", messagingSenderId: "39399207872", appId: "1:39399207872:web:087afb400ef0be078b0e25" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // --- UTILS ---
        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const div = document.createElement('div');
            div.className = `${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white px-6 py-3 rounded-xl shadow-xl font-bold text-sm flex items-center gap-3 transition-all`;
            div.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`;
            container.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
        window.smartParseIcon = (s) => { if (!s) return ''; s = s.trim(); if (s.startsWith('http')) return `<img src="${s}">`; if (s.startsWith('<')) return s; return `<i class="${s}"></i>`; }

        // --- AUTH ---
        onAuthStateChanged(auth, async (u) => {
            if(u) { document.getElementById('login-box').classList.add('hidden'); document.getElementById('dashboard').classList.remove('hidden'); loadConfig(); load(); switchTab('esign'); } 
            else { document.getElementById('login-box').classList.remove('hidden'); document.getElementById('dashboard').classList.add('hidden'); }
        });
        document.getElementById('btn-login').addEventListener('click', () => signInWithEmailAndPassword(auth, document.getElementById('adm-email').value, document.getElementById('adm-pass').value).catch(() => document.getElementById('err-msg').classList.remove('hidden')));
        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // --- RENDER CONFIG UI ---
        const renderConfigButtons = () => {
            const area = document.getElementById('buttons-config-area');
            area.innerHTML = [1,2,3].map(i => `
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-col gap-3">
                    <div class="flex justify-between items-center"><div class="text-xs font-bold text-indigo-600 uppercase">Nút ${i}</div><div id="btn${i}-preview" class="icon-preview-box w-6 h-6 text-slate-400"></div></div>
                    <input id="btn${i}-text" class="w-full p-2 rounded border text-sm" placeholder="Tên nút...">
                    <input id="btn${i}-url" class="w-full p-2 rounded border text-sm font-mono text-xs text-blue-600" placeholder="https://...">
                    <input id="btn${i}-icon" class="w-full p-2 rounded border text-sm" placeholder="Icon" oninput="window.previewHeroIcon(${i}, this.value)">
                    <div class="grid grid-cols-3 gap-2 mt-1">
                        <div class="text-center"><label class="text-[9px] font-bold block">NỀN</label><input type="color" id="btn${i}-bg-color" class="w-full h-6 p-0 border rounded cursor-pointer" value="#ffffff"></div>
                        <div class="text-center"><label class="text-[9px] font-bold block">CHỮ</label><input type="color" id="btn${i}-text-color" class="w-full h-6 p-0 border rounded cursor-pointer" value="#000000"></div>
                        <div class="text-center"><label class="text-[9px] font-bold block">ICON</label><input type="color" id="btn${i}-icon-color" class="w-full h-6 p-0 border rounded cursor-pointer" value="#000000"></div>
                    </div>
                </div>`).join('');
        }; renderConfigButtons();

        async function loadConfig() {
            try {
                const d = (await getDoc(doc(db, "settings", "general"))).data();
                if(d) {
                    document.getElementById('cfg-title').value = d.title||""; document.getElementById('cfg-title-color').value = d.titleColor||"#000000";
                    document.getElementById('cfg-subtitle').value = d.subtitle||""; document.getElementById('cfg-subtitle-color').value = d.subtitleColor||"#64748b";
                    (d.heroButtons || []).forEach((b, i) => {
                        const idx = i+1; if(idx>3) return;
                        document.getElementById(`btn${idx}-text`).value = b.text||""; document.getElementById(`btn${idx}-url`).value = b.url||""; document.getElementById(`btn${idx}-icon`).value = b.icon||"";
                        document.getElementById(`btn${idx}-bg-color`).value = b.bgColor||"#ffffff"; document.getElementById(`btn${idx}-text-color`).value = b.textColor||"#000000"; document.getElementById(`btn${idx}-icon-color`).value = b.iconColor||"#000000";
                        window.previewHeroIcon(idx, b.icon||"");
                    });
                }
            } catch(e){}
        }
        
        window.saveConfig = async () => {
             const btns = [1,2,3].map(i => ({
                 text: document.getElementById(`btn${i}-text`).value, url: document.getElementById(`btn${i}-url`).value, icon: document.getElementById(`btn${i}-icon`).value,
                 bgColor: document.getElementById(`btn${i}-bg-color`).value, textColor: document.getElementById(`btn${i}-text-color`).value, iconColor: document.getElementById(`btn${i}-icon-color`).value
             }));
             await setDoc(doc(db, "settings", "general"), { 
                 title: document.getElementById('cfg-title').value, titleColor: document.getElementById('cfg-title-color').value,
                 subtitle: document.getElementById('cfg-subtitle').value, subtitleColor: document.getElementById('cfg-subtitle-color').value, heroButtons: btns 
             }, { merge: true });
             showToast("Đã lưu cấu hình!");
        }
        window.previewHeroIcon = (i, v) => document.getElementById(`btn${i}-preview`).innerHTML = window.smartParseIcon(v);

        // --- APP LOGIC ---
        let curType = 'esign'; let allData = [];
        async function load() {
            // Load về và sắp xếp luôn theo 'order'
            const s = await getDocs(query(collection(db, "apps"), orderBy("order", "asc")));
            allData = []; s.forEach(d => allData.push({id: d.id, ...d.data()}));
            // Fallback sort nếu DB chưa có index
            allData.sort((a,b) => (a.order || 9999) - (b.order || 9999));
            render();
        }
        
        function render() {
            const term = document.getElementById('search-app').value.toLowerCase();
            const list = allData.filter(i => i.type === curType && (i.name.toLowerCase().includes(term)));
            document.getElementById('count-badge').innerText = `${list.length} App`;
            document.getElementById('list-data').innerHTML = list.map(i => `
                <div draggable="true" class="draggable-item bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex items-center gap-4 group hover:shadow-md transition-all cursor-move select-none" data-id="${i.id}">
                    <div class="text-slate-300 px-2"><i class="fas fa-grip-vertical"></i></div>
                    <div class="relative w-12 h-12 rounded-lg bg-slate-100 overflow-hidden shrink-0 border icon-preview-box">${window.smartParseIcon(i.icon)}</div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-slate-800 truncate">${i.name} ${i.status==='hidden'?'<span class="text-[10px] bg-slate-200 px-1 rounded">ẨN</span>':''}</h4>
                        <p class="text-xs text-slate-500"><span class="text-indigo-600 font-bold"><i class="fas fa-download"></i> ${i.downloads || 0}</span></p>
                    </div>
                    <div class="flex gap-2"><button onclick="window.edit('${i.id}')" class="w-8 h-8 rounded bg-slate-50 text-indigo-600 hover:bg-indigo-600 hover:text-white transition"><i class="fas fa-pen text-xs"></i></button><button onclick="window.del('${i.id}')" class="w-8 h-8 rounded bg-slate-50 text-red-500 hover:bg-red-500 hover:text-white transition"><i class="fas fa-trash text-xs"></i></button></div>
                </div>`).join('');
            addDragEvents();
        }

        // DRAG & DROP LOGIC
        function addDragEvents() {
            const container = document.getElementById('list-data');
            document.querySelectorAll('.draggable-item').forEach(d => {
                d.addEventListener('dragstart', () => d.classList.add('dragging'));
                d.addEventListener('dragend', async () => { d.classList.remove('dragging'); await saveOrder(); });
            });
            container.addEventListener('dragover', e => {
                e.preventDefault();
                const afterElement = [...container.querySelectorAll('.draggable-item:not(.dragging)')].reduce((closest, child) => {
                    const box = child.getBoundingClientRect(); const offset = e.clientY - box.top - box.height / 2;
                    return offset < 0 && offset > closest.offset ? { offset: offset, element: child } : closest;
                }, { offset: Number.NEGATIVE_INFINITY }).element;
                const draggable = document.querySelector('.dragging');
                if (draggable) { if (!afterElement) container.appendChild(draggable); else container.insertBefore(draggable, afterElement); }
            });
        }

        async function saveOrder() {
            // Không lưu nếu đang tìm kiếm vì danh sách không đủ
            if(document.getElementById('search-app').value.trim() !== "") {
                showToast("Vui lòng xóa ô tìm kiếm trước khi sắp xếp!", "error"); return;
            }
            
            const batch = writeBatch(db);
            const items = document.querySelectorAll('.draggable-item');
            
            // Logic: Cập nhật order cho các item hiện tại, các item thuộc loại khác giữ nguyên
            items.forEach((item, index) => {
                const id = item.dataset.id;
                // Update trong DB
                batch.update(doc(db, "apps", id), { order: index });
                // Update local array để UI không bị nhảy
                const d = allData.find(x => x.id === id); 
                if(d) d.order = index;
            });

            try { await batch.commit(); showToast("Đã lưu vị trí!", "success"); } 
            catch(e) { console.error(e); showToast("Lỗi khi lưu vị trí", "error"); }
        }

        document.getElementById('search-app').addEventListener('input', render);
        window.switchTab = (t) => { curType = t; document.querySelectorAll('.tab-btn').forEach(btn => btn.className = (btn.dataset.tab === t) ? "tab-btn px-6 py-2.5 rounded-xl text-sm font-bold bg-indigo-600 text-white shadow-lg transition-all" : "tab-btn px-6 py-2.5 rounded-xl text-sm font-bold bg-white text-slate-500 hover:bg-slate-50 transition-all"); render(); }
        window.previewIcon = (val) => document.getElementById('icon-preview').innerHTML = window.smartParseIcon(val);
        window.openModal = () => {
            document.getElementById('edit-id').value = ''; document.getElementById('inp-name').value = ''; document.getElementById('inp-desc').value = ''; document.getElementById('inp-url').value = ''; document.getElementById('inp-icon').value = ''; document.getElementById('inp-downloads').value = '0'; document.getElementById('icon-preview').innerHTML = ''; document.getElementById('modal-title').innerText = `Thêm Mới`; document.getElementById('modal').classList.remove('hidden');
        };
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        window.edit = (id) => {
            const item = allData.find(x => x.id === id); if(!item) return;
            document.getElementById('edit-id').value = id; document.getElementById('inp-name').value = item.name; document.getElementById('inp-desc').value = item.desc; document.getElementById('inp-url').value = item.url; document.getElementById('inp-icon').value = item.icon; document.getElementById('inp-downloads').value = item.downloads || 0; document.getElementById('icon-preview').innerHTML = window.smartParseIcon(item.icon); document.getElementById('inp-badge').value = item.badge || ''; document.getElementById('inp-status').value = item.status || 'active'; document.getElementById('modal-title').innerText = `Sửa App`; document.getElementById('modal').classList.remove('hidden');
        };
        window.del = async (id) => { if(confirm("Xóa nhé?")) { await deleteDoc(doc(db, "apps", id)); allData = allData.filter(x => x.id !== id); render(); showToast("Đã xóa!"); } };
        
        document.getElementById('btn-save').addEventListener('click', async () => {
            const id = document.getElementById('edit-id').value; const name = document.getElementById('inp-name').value; if(!name) return alert("Nhập tên đi!");
            const btn = document.getElementById('btn-save'); btn.innerHTML = 'Lưu...'; btn.disabled = true;
            
            // Nếu là mới, gán order cuối cùng
            let newOrder = 9999;
            if(!id) { const max = allData.reduce((m, p) => (p.order||0) > m ? (p.order||0) : m, 0); newOrder = max + 1; }

            const data = { type: curType, name, desc: document.getElementById('inp-desc').value, url: document.getElementById('inp-url').value, icon: document.getElementById('inp-icon').value, badge: document.getElementById('inp-badge').value, status: document.getElementById('inp-status').value, downloads: Number(document.getElementById('inp-downloads').value)||0, updatedAt: new Date().toISOString() };
            if(!id) data.order = newOrder;

            const ref = doc(db, "apps", id || (curType[0] + Date.now()));
            await setDoc(ref, data, { merge: true });
            
            if(id) { const idx = allData.findIndex(x => x.id === id); if(idx > -1) allData[idx] = { ...allData[idx], ...data }; } 
            else { allData.push({ id: ref.id, ...data }); }
            
            closeModal(); load(); showToast("Đã lưu!"); btn.innerHTML = 'Lưu'; btn.disabled = false;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link 4Sub Pro - Secure Unlock</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome & Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Firebase SDKs (Compat version for simple HTML usage) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .loader {
            border-top-color: #3b82f6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- CẤU HÌNH FIREBASE ---
        // Lấy config từ môi trường (nếu chạy trong môi trường đặc biệt) hoặc fallback
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                // THAY THẾ BẰNG CONFIG CỦA BẠN NẾU CHẠY LOCAL
                apiKey: "YOUR_API_KEY",
                authDomain: "YOUR_PROJECT.firebaseapp.com",
                projectId: "YOUR_PROJECT_ID",
                storageBucket: "YOUR_PROJECT.appspot.com",
                messagingSenderId: "YOUR_SENDER_ID",
                appId: "YOUR_APP_ID"
            };

        // Khởi tạo Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // App ID dùng chung cho đường dẫn Firestore (Theo quy tắc hệ thống)
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-link4sub';

        const { useState, useEffect, useRef } = React;

        // --- COMPONENTS ---

        // 1. Loading Component
        const Loading = () => (
            <div className="flex flex-col items-center justify-center min-h-screen">
                <div className="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
                <p className="text-gray-400 text-sm animate-pulse">Đang kết nối dữ liệu an toàn...</p>
            </div>
        );

        // 2. Admin Login
        const AdminLogin = ({ onLogin }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                    onLogin();
                } catch (err) {
                    setError('Đăng nhập thất bại: ' + err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="glass-panel p-8 rounded-2xl w-full max-w-md">
                        <h2 className="text-2xl font-bold mb-6 text-center text-blue-400"><i className="fas fa-user-shield mr-2"></i>Admin Access</h2>
                        {error && <div className="bg-red-500/20 text-red-200 p-3 rounded mb-4 text-sm">{error}</div>}
                        <form onSubmit={handleLogin} className="space-y-4">
                            <div>
                                <label className="block text-sm text-gray-400 mb-1">Email</label>
                                <input type="email" value={email} onChange={e => setEmail(e.target.value)} 
                                    className="w-full bg-slate-800 border border-slate-700 rounded p-2 text-white focus:border-blue-500 outline-none" required />
                            </div>
                            <div>
                                <label className="block text-sm text-gray-400 mb-1">Password</label>
                                <input type="password" value={password} onChange={e => setPassword(e.target.value)} 
                                    className="w-full bg-slate-800 border border-slate-700 rounded p-2 text-white focus:border-blue-500 outline-none" required />
                            </div>
                            <button type="submit" disabled={loading} 
                                className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition">
                                {loading ? 'Đang xử lý...' : 'Đăng nhập'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // 3. Admin Dashboard (Tạo Link)
        const AdminDashboard = ({ user }) => {
            const [links, setLinks] = useState([]);
            const [newLink, setNewLink] = useState({ title: '', targetUrl: '', taskUrl: '', buttonText: 'Đăng ký kênh' });
            const [msg, setMsg] = useState('');

            // Fetch Links
            useEffect(() => {
                if (!user) return;
                const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('links')
                    .orderBy('createdAt', 'desc')
                    .onSnapshot(snapshot => {
                        const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setLinks(list);
                    }, err => console.error("Lỗi tải link:", err));
                return () => unsubscribe();
            }, [user]);

            const createLink = async (e) => {
                e.preventDefault();
                try {
                    // Mã hóa URL đích cơ bản trước khi lưu (Không quá quan trọng vì ta dùng Firestore rule, nhưng tốt cho UI)
                    // Ở đây lưu plain text vào DB, client sẽ chỉ nhận được khi unlock
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('links').add({
                        ...newLink,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        clicks: 0
                    });
                    setMsg('Đã tạo link thành công!');
                    setNewLink({ title: '', targetUrl: '', taskUrl: '', buttonText: 'Đăng ký kênh' });
                    setTimeout(() => setMsg(''), 3000);
                } catch (err) {
                    setMsg('Lỗi: ' + err.message);
                }
            };

            const deleteLink = async (id) => {
                if(confirm('Bạn có chắc muốn xóa link này?')) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('links').doc(id).delete();
                }
            };

            const copyLink = (id) => {
                const url = `${window.location.origin}${window.location.pathname}?id=${id}`;
                navigator.clipboard.writeText(url);
                alert('Đã copy link rút gọn: ' + url);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto">
                    <div className="flex justify-between items-center mb-8">
                        <h1 className="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                            Quản lý Link 4Sub
                        </h1>
                        <button onClick={() => auth.signOut()} className="text-sm text-red-400 hover:text-red-300">Đăng xuất</button>
                    </div>

                    <div className="grid md:grid-cols-3 gap-8">
                        {/* Form tạo link */}
                        <div className="md:col-span-1">
                            <div className="glass-panel p-6 rounded-xl sticky top-8">
                                <h3 className="text-xl font-semibold mb-4 text-white">Tạo Link Mới</h3>
                                {msg && <div className={`p-2 rounded mb-3 text-sm ${msg.includes('Lỗi') ? 'bg-red-500/20 text-red-200' : 'bg-green-500/20 text-green-200'}`}>{msg}</div>}
                                <form onSubmit={createLink} className="space-y-4">
                                    <div>
                                        <label className="text-xs text-gray-400 uppercase">Tiêu đề Link</label>
                                        <input type="text" placeholder="VD: Mod Game Full Tiền" 
                                            value={newLink.title} onChange={e => setNewLink({...newLink, title: e.target.value})}
                                            className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white text-sm" required />
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-400 uppercase">Link Đích (Cần giấu)</label>
                                        <input type="url" placeholder="https://mediafire.com/..." 
                                            value={newLink.targetUrl} onChange={e => setNewLink({...newLink, targetUrl: e.target.value})}
                                            className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white text-sm" required />
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-400 uppercase">Link Nhiệm Vụ</label>
                                        <input type="url" placeholder="https://youtube.com/channel/..." 
                                            value={newLink.taskUrl} onChange={e => setNewLink({...newLink, taskUrl: e.target.value})}
                                            className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white text-sm" required />
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-400 uppercase">Nội dung nút</label>
                                        <input type="text" placeholder="Đăng ký kênh" 
                                            value={newLink.buttonText} onChange={e => setNewLink({...newLink, buttonText: e.target.value})}
                                            className="w-full bg-slate-900 border border-slate-700 rounded p-2 text-white text-sm" />
                                    </div>
                                    <button type="submit" className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-2 rounded shadow-lg">
                                        Tạo Link Bảo Mật
                                    </button>
                                </form>
                            </div>
                        </div>

                        {/* Danh sách link */}
                        <div className="md:col-span-2 space-y-4">
                            <h3 className="text-xl font-semibold text-white">Danh sách Link ({links.length})</h3>
                            {links.map(link => (
                                <div key={link.id} className="glass-panel p-4 rounded-xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                    <div className="flex-1 overflow-hidden">
                                        <h4 className="font-bold text-blue-300 truncate">{link.title}</h4>
                                        <p className="text-xs text-gray-500 truncate">Đích: {link.targetUrl}</p>
                                        <p className="text-xs text-gray-500">Ngày tạo: {link.createdAt?.toDate().toLocaleDateString('vi-VN')}</p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => copyLink(link.id)} className="bg-slate-700 hover:bg-slate-600 text-white px-3 py-1 rounded text-sm">
                                            <i className="fas fa-copy mr-1"></i> Copy
                                        </button>
                                        <button onClick={() => deleteLink(link.id)} className="bg-red-900/50 hover:bg-red-900 text-red-200 px-3 py-1 rounded text-sm">
                                            <i className="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            ))}
                            {links.length === 0 && <p className="text-center text-gray-500 italic">Chưa có link nào được tạo.</p>}
                        </div>
                    </div>
                </div>
            );
        };

        // 4. User View (Giao diện làm nhiệm vụ)
        const UserLinkView = ({ linkId }) => {
            const [linkData, setLinkData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [step, setStep] = useState(0); // 0: Check ID, 1: Show Task, 2: Checking, 3: Unlocked
            const [error, setError] = useState('');
            const [countDown, setCountDown] = useState(0);

            // Session check key
            const sessionKey = `unlocked_${linkId}`;

            useEffect(() => {
                // 1. Load Link Metadata (nhưng KHÔNG load targetUrl ngay lập tức để bảo mật)
                // Trong thực tế cần Cloud Functions để ẩn hoàn toàn, nhưng ở đây ta chỉ fetch field cần thiết
                const fetchLink = async () => {
                    try {
                        const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('links').doc(linkId);
                        const docSnap = await docRef.get();
                        
                        if (docSnap.exists) {
                            const data = docSnap.data();
                            // Chỉ set những data an toàn
                            setLinkData({ 
                                id: docSnap.id,
                                title: data.title,
                                taskUrl: data.taskUrl,
                                buttonText: data.buttonText,
                                // targetUrl: data.targetUrl // KHÔNG set cái này vội
                            });

                            // Kiểm tra xem user này đã unlock chưa (chống share link unlock)
                            const savedSession = sessionStorage.getItem(sessionKey);
                            if (savedSession) {
                                unlockLink(data.targetUrl); // Nếu đã làm rồi thì mở luôn
                            } else {
                                setStep(1);
                            }
                        } else {
                            setError('Link không tồn tại hoặc đã bị xóa.');
                        }
                    } catch (err) {
                        setError('Lỗi kết nối: ' + err.message);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchLink();
            }, [linkId]);

            const startTask = () => {
                if (!linkData) return;
                // Mở tab mới làm nhiệm vụ
                window.open(linkData.taskUrl, '_blank');
                
                // Chuyển sang trạng thái chờ
                setStep(2);
                setCountDown(10); // 10 giây giả lập check
            };

            useEffect(() => {
                if (step === 2 && countDown > 0) {
                    const timer = setTimeout(() => setCountDown(countDown - 1), 1000);
                    return () => clearTimeout(timer);
                } else if (step === 2 && countDown === 0) {
                    // Hết giờ, cho phép lấy link
                    fetchRealUrl();
                }
            }, [step, countDown]);

            const fetchRealUrl = async () => {
                setLoading(true);
                try {
                    // Lấy lại link để lấy field targetUrl
                    const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('links').doc(linkId);
                    const docSnap = await docRef.get();
                    if(docSnap.exists) {
                        const realData = docSnap.data();
                        
                        // Đánh dấu session cục bộ là đã unlock (Bảo vệ chống share link)
                        // Nếu user copy URL hiện tại gửi cho bạn, bạn họ mở lên sessionKey = null => Phải làm lại từ đầu.
                        sessionStorage.setItem(sessionKey, 'true');
                        
                        // Tăng view counter
                        docRef.update({ clicks: firebase.firestore.FieldValue.increment(1) });

                        unlockLink(realData.targetUrl);
                    }
                } catch(e) {
                    setError("Không thể xác thực nhiệm vụ.");
                } finally {
                    setLoading(false);
                }
            };

            const unlockLink = (url) => {
                setLinkData(prev => ({ ...prev, targetUrl: url }));
                setStep(3);
            };

            if (loading) return <Loading />;

            if (error) return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="glass-panel p-8 rounded-2xl max-w-md w-full text-center border-red-500/30">
                        <i className="fas fa-exclamation-triangle text-4xl text-red-500 mb-4"></i>
                        <h2 className="text-xl font-bold text-white mb-2">Liên kết hỏng</h2>
                        <p className="text-gray-400">{error}</p>
                        <a href="/" className="mt-6 inline-block text-blue-400 hover:text-blue-300">Quay về trang chủ</a>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">
                    {/* Background Effect */}
                    <div className="absolute top-0 left-0 w-full h-full bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-blue-900/20 via-slate-900 to-black -z-10"></div>

                    <div className="glass-panel p-6 md:p-10 rounded-3xl max-w-lg w-full shadow-2xl relative z-10 border-t border-blue-500/20">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-blue-500/30">
                                <i className="fas fa-lock text-2xl text-white"></i>
                            </div>
                            <h1 className="text-2xl font-bold text-white mb-2">{linkData.title}</h1>
                            <p className="text-gray-400 text-sm">Hoàn thành các bước dưới đây để lấy link gốc.</p>
                        </div>

                        {/* Step 1: Nút bấm nhiệm vụ */}
                        {step === 1 && (
                            <div className="space-y-4 animate-fade-in">
                                <div className="bg-slate-800/50 p-4 rounded-xl border border-slate-700 flex items-center justify-between group cursor-pointer hover:border-red-500 transition" onClick={startTask}>
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-full bg-red-600 flex items-center justify-center">
                                            <i className="fab fa-youtube text-white"></i>
                                        </div>
                                        <div className="text-left">
                                            <p className="font-bold text-gray-200">Bước 1</p>
                                            <p className="text-sm text-gray-400">{linkData.buttonText}</p>
                                        </div>
                                    </div>
                                    <i className="fas fa-chevron-right text-gray-500 group-hover:text-white transition"></i>
                                </div>
                                <div className="text-center text-xs text-gray-500 mt-4">
                                    <i className="fas fa-shield-alt mr-1"></i> Link được bảo vệ bởi công nghệ Firebase SafeLink
                                </div>
                            </div>
                        )}

                        {/* Step 2: Đếm ngược */}
                        {step === 2 && (
                            <div className="text-center space-y-6 py-4">
                                <div className="relative w-24 h-24 mx-auto">
                                    <svg className="w-full h-full" viewBox="0 0 100 100">
                                        <circle className="text-slate-700 stroke-current" strokeWidth="8" cx="50" cy="50" r="40" fill="transparent"></circle>
                                        <circle className="text-blue-500 stroke-current origin-center -rotate-90 transition-all duration-1000 ease-linear" 
                                            strokeWidth="8" strokeLinecap="round" cx="50" cy="50" r="40" fill="transparent" 
                                            strokeDasharray="251.2" strokeDashoffset={251.2 - (251.2 * countDown) / 10}></circle>
                                    </svg>
                                    <div className="absolute top-0 left-0 w-full h-full flex items-center justify-center">
                                        <span className="text-2xl font-bold text-white">{countDown}</span>
                                    </div>
                                </div>
                                <div>
                                    <h3 className="text-lg font-semibold text-white">Đang xác minh...</h3>
                                    <p className="text-sm text-gray-400">Vui lòng không đóng tab nhiệm vụ.</p>
                                </div>
                            </div>
                        )}

                        {/* Step 3: Success / Unlock */}
                        {step === 3 && (
                            <div className="text-center space-y-6">
                                <div className="w-20 h-20 bg-green-500 rounded-full mx-auto flex items-center justify-center shadow-lg shadow-green-500/50 animate-bounce">
                                    <i className="fas fa-unlock text-3xl text-white"></i>
                                </div>
                                <div>
                                    <h2 className="text-xl font-bold text-green-400 mb-2">Đã mở khóa thành công!</h2>
                                    <p className="text-sm text-gray-400 mb-4">Link đích của bạn đã sẵn sàng.</p>
                                    
                                    <div className="bg-slate-900 p-3 rounded border border-slate-700 break-all mb-4 text-xs text-gray-500 font-mono">
                                        {/* Hiển thị một phần link hoặc mã hóa giả để trông ngầu */}
                                        Protected: {btoa(linkData.targetUrl).substring(0, 20)}...
                                    </div>

                                    <a href={linkData.targetUrl} target="_blank" rel="noopener noreferrer" 
                                       className="block w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition transform hover:scale-105">
                                        MỞ LINK NGAY
                                    </a>
                                </div>
                                <p className="text-xs text-red-400">
                                    <i className="fas fa-exclamation-circle mr-1"></i> 
                                    Lưu ý: Link này chỉ mở được trên thiết bị của bạn. Không copy link trang này gửi cho người khác.
                                </p>
                            </div>
                        )}
                    </div>
                    
                    {/* Footer */}
                    <div className="absolute bottom-4 text-center w-full text-xs text-gray-600">
                        &copy; 2024 Link4Sub Pro. Powered by Firebase.
                    </div>
                </div>
            );
        };

        // 5. Main App Controller
        const App = () => {
            const [user, setUser] = useState(null);
            const [mode, setMode] = useState('loading'); // loading, link, admin_login, admin_dash
            const [currentLinkId, setCurrentLinkId] = useState(null);

            useEffect(() => {
                // Check Login Status
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                });

                // Check URL Params
                const params = new URLSearchParams(window.location.search);
                const linkId = params.get('id');
                const adminMode = params.get('mode') === 'admin';

                if (adminMode) {
                    setMode(user ? 'admin_dash' : 'admin_login');
                } else if (linkId) {
                    setCurrentLinkId(linkId);
                    setMode('link');
                } else {
                    // Mặc định nếu không có ID và không phải admin -> Có thể hiển thị trang chủ hoặc chuyển về Admin login
                    setMode('admin_login'); 
                }

                return () => unsubscribe();
            }, [user]);

            // Nếu user login xong mà đang ở mode login -> chuyển sang dash
            useEffect(() => {
                if (user && mode === 'admin_login') {
                    setMode('admin_dash');
                }
                if (!user && mode === 'admin_dash') {
                    setMode('admin_login');
                }
            }, [user, mode]);

            if (mode === 'loading') return <Loading />;
            
            if (mode === 'link') {
                return <UserLinkView linkId={currentLinkId} />;
            }

            if (mode === 'admin_login') {
                return <AdminLogin onLogin={() => setMode('admin_dash')} />;
            }

            if (mode === 'admin_dash') {
                return <AdminDashboard user={user} />;
            }

            return <div>404 Not Found</div>;
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

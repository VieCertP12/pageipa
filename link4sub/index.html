<!DOCTYPE html>
<html dir="ltr" lang="vi">
<head>
    <title>Link4Sub Pro - Admin Dashboard</title>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif !important; background-color: #f8fafc; -webkit-user-select: none; user-select: none; }
        .tab-active { color: #2563eb !important; border-bottom: 4px solid #2563eb !important; opacity: 1 !important; background: #fff !important; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        #toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; }
        .toast { min-width: 280px; padding: 16px 24px; border-radius: 12px; color: white; font-weight: 700; shadow: 0 10px 15px rgba(0,0,0,0.1); animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        .btn-platform { transition: all 0.2s ease; }
        .btn-platform:hover { transform: translateY(-2px); opacity: 0.9; }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <nav class="fixed top-0 left-0 w-full bg-white h-16 flex items-center justify-between px-8 border-b z-50">
        <div class="flex items-center gap-3">
            <div class="bg-red-600 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold"><i class="fa-solid fa-link"></i></div>
            <span class="font-black text-slate-800 text-lg uppercase tracking-tighter">Link4Sub Admin</span>
        </div>
        <div id="nav-actions"></div>
    </nav>

    <main class="min-h-screen pt-24 pb-12 px-4 flex flex-col items-center">
        <div id="mainContainer" class="w-full max-w-5xl">
            <div class="flex justify-center py-20"><i class="fa-solid fa-spinner fa-spin text-3xl text-slate-200"></i></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, getDoc, deleteDoc, updateDoc, setDoc, increment, serverTimestamp, query, orderBy } 
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMYvnDTyzfBIAFTuB9VLPYN-YiFtNov6c", 
            authDomain: "linksubproject.firebaseapp.com",
            projectId: "linksubproject",
            storageBucket: "linksubproject.firebasestorage.app",
            messagingSenderId: "899237330148",
            appId: "1:899237330148:web:13bf3cf081f1cb9dc808f1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const container = document.getElementById('mainContainer');
        const urlParams = new URLSearchParams(window.location.search);
        const linkId = urlParams.get('id');

        let currentTasks = [];
        let completedSet = new Set();
        let editId = null;
        let activePlatform = null;

        window.showToast = (msg, type='info') => {
            const t = document.createElement('div');
            t.className = `toast ${type === 'success' ? 'bg-emerald-500' : 'bg-slate-800'}`;
            t.innerHTML = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        };

        const platformConfig = {
            youtube: { color: 'bg-red-600', icon: 'fa-brands fa-youtube', label: 'YouTube' },
            telegram: { color: 'bg-[#0088cc]', icon: 'fa-brands fa-telegram', label: 'Telegram' },
            tiktok: { color: 'bg-black', icon: 'fa-brands fa-tiktok', label: 'TikTok' },
            facebook: { color: 'bg-[#1877f2]', icon: 'fa-brands fa-facebook', label: 'Facebook' },
            instagram: { color: 'bg-[#e4405f]', icon: 'fa-brands fa-instagram', label: 'Instagram' },
            discord: { color: 'bg-[#5865f2]', icon: 'fa-brands fa-discord', label: 'Discord' }
        };

        async function init() {
            if (linkId) loadUserPage();
            else onAuthStateChanged(auth, u => {
                document.getElementById('nav-actions').innerHTML = u ? `<button onclick="signOut(auth)" class="text-red-500 font-bold text-xs">Đăng xuất</button>` : '';
                u ? renderAdminDashboard() : renderLogin();
            });
        }
        window.signOut = signOut;
        init();

        // --- ADMIN LOGIN ---
        function renderLogin() {
            container.innerHTML = `<div class="max-w-sm mx-auto bg-white p-10 rounded-2xl shadow-xl mt-10">
                <h2 class="text-xl font-black text-center mb-6">ADMIN LOGIN</h2>
                <input id="email" type="email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-xl mb-3 outline-none">
                <input id="pass" type="password" placeholder="Pass" class="w-full p-4 bg-slate-50 rounded-xl mb-6 outline-none">
                <button onclick="window.login()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">VÀO HỆ THỐNG</button>
            </div>`;
            window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert("Sai thông tin!"));
        }

        // --- ADMIN DASHBOARD ---
        async function renderAdminDashboard() {
            container.innerHTML = `
            <div class="fade-in w-full">
                <div class="flex justify-center mb-8">
                    <div class="bg-slate-100 p-1.5 rounded-2xl flex gap-1">
                        <button onclick="window.switchTab('create')" id="tab-create" class="px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest tab-active transition-all">STU</button>
                        <button onclick="window.switchTab('manage')" id="tab-manage" class="px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest text-slate-400 transition-all">Quản lý Link</button>
                    </div>
                </div>

                <div id="section-create" class="max-w-4xl mx-auto bg-white p-10 rounded-3xl shadow-xl border border-slate-50">
                    <h3 class="font-black text-center text-xl mb-8">Tạo mới</h3>
                    <div class="space-y-5">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input id="bTitle" type="text" placeholder="Nhập tiêu đề.. (tuỳ chọn)" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 outline-none font-medium">
                            <input id="bSubTitle" type="text" placeholder="Nhập tiêu đề phụ.. (tuỳ chọn)" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 outline-none font-medium">
                        </div>
                        
                        <div class="flex flex-wrap gap-2 justify-center py-2">
                            ${Object.keys(platformConfig).map(p => `
                                <button onclick="window.togglePlatformOptions('${p}')" class="btn-platform ${platformConfig[p].color} text-white px-5 py-2.5 rounded-xl font-black text-[11px] flex items-center gap-2">
                                    ${platformConfig[p].label} <i class="fa-solid fa-plus text-[10px]"></i>
                                </button>
                            `).join('')}
                        </div>

                        <div id="sub-options-panel" class="hidden p-6 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 fade-in">
                            <p id="sub-panel-title" class="text-center font-black text-[10px] uppercase text-slate-400 mb-4 tracking-widest"></p>
                            <div id="sub-buttons-container" class="flex flex-wrap gap-2 justify-center"></div>
                        </div>

                        <div id="bTaskList" class="space-y-2"></div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-t pt-6">
                            <input id="bDestName" type="text" placeholder="Nhập tên nút.. (tùy chọn)" class="w-full p-4 bg-slate-50 rounded-xl outline-none font-medium">
                            <input id="bDest" type="text" placeholder="Liên kết URL cần chuyển đến.." class="w-full p-4 bg-slate-50 rounded-xl outline-none font-medium border-l-4 border-blue-500">
                        </div>

                        <div class="flex gap-4 pt-6">
                            <button onclick="window.saveL()" id="btnSave" class="flex-1 bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-xs shadow-lg shadow-blue-200">Tạo liên kết</button>
                            <button onclick="window.resetForm()" class="px-8 bg-slate-100 text-slate-600 rounded-xl font-black uppercase text-xs">Đặt lại</button>
                        </div>
                    </div>
                </div>

                <div id="section-manage" class="hidden max-w-4xl mx-auto">
                    <div class="bg-white p-8 rounded-3xl shadow-xl">
                        <div class="flex justify-between items-center mb-6 border-b pb-4 font-black text-sm text-slate-500 uppercase">Danh sách Link của bạn</div>
                        <div id="history" class="space-y-4"></div>
                    </div>
                </div>
            </div>`;
            loadHistory();
        }

        window.switchTab = (tab) => {
            const isCreate = tab === 'create';
            document.getElementById('section-create').classList.toggle('hidden', !isCreate);
            document.getElementById('section-manage').classList.toggle('hidden', isCreate);
            document.getElementById('tab-create').className = isCreate ? "px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest tab-active transition-all" : "px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest text-slate-400 transition-all";
            document.getElementById('tab-manage').className = !isCreate ? "px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest tab-active transition-all" : "px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest text-slate-400 transition-all";
            if(!isCreate) loadHistory();
        };

        // --- LOGIC NHIỆM VỤ CON (Ảnh 3 & Ảnh 4) ---
        window.togglePlatformOptions = (platform) => {
            const panel = document.getElementById('sub-options-panel');
            const container = document.getElementById('sub-buttons-container');
            const title = document.getElementById('sub-panel-title');
            
            if (activePlatform === platform) {
                panel.classList.add('hidden'); activePlatform = null; return;
            }

            activePlatform = platform;
            panel.classList.remove('hidden');
            title.innerText = platform.toUpperCase();
            container.innerHTML = '';

            let subTasks = [];
            if(platform === 'youtube') {
                subTasks = [
                    { id: 'yt_sub1', label: 'Đăng ký', color: 'bg-red-600' },
                    { id: 'yt_sub2', label: 'Đăng ký #2', color: 'bg-red-600' },
                    { id: 'yt_sub3', label: 'Đăng ký #3', color: 'bg-red-600' },
                    { id: 'yt_like1', label: 'Thích', color: 'bg-red-600' },
                    { id: 'yt_like2', label: 'Thích #2', color: 'bg-red-600' },
                    { id: 'yt_like3', label: 'Thích #3', color: 'bg-red-600' },
                    { id: 'yt_cmt1', label: 'Bình luận', color: 'bg-red-600', full: true },
                    { id: 'yt_cmt2', label: 'Bình luận #2', color: 'bg-red-600', full: true }
                ];
            } else if (platform === 'telegram') {
                subTasks = [
                    { id: 'tg_g1', label: 'Tham gia Group', color: 'bg-[#0088cc]' },
                    { id: 'tg_g2', label: 'Tham gia Group #2', color: 'bg-[#0088cc]' },
                    { id: 'tg_g3', label: 'Tham gia Group #3', color: 'bg-[#0088cc]' }
                ];
            } else {
                subTasks = [{ id: platform + '_std', label: 'Theo dõi / Thích', color: platformConfig[platform].color }];
            }

            container.innerHTML = subTasks.map(st => `
                <button onclick="window.addActualTask('${platform}', '${st.id}', '${st.label}')" class="${st.color} ${st.full ? 'w-full' : ''} text-white px-6 py-3 rounded-xl font-bold text-[11px] shadow-sm hover:opacity-80 transition-all flex items-center justify-center gap-2">
                    ${st.label} <i class="fa-solid fa-plus text-[9px]"></i>
                </button>
            `).join('');
        };

        window.addActualTask = (p, id, label) => {
            currentTasks.push({ platform: p, id: id, label: label, url: '' });
            renderTaskInputs();
            document.getElementById('sub-options-panel').classList.add('hidden');
            activePlatform = null;
        };

        window.removeTask = (i) => { currentTasks.splice(i, 1); renderTaskInputs(); };

        function renderTaskInputs() {
            document.getElementById('bTaskList').innerHTML = currentTasks.map((t, i) => `
                <div class="p-4 bg-white rounded-2xl border border-slate-100 shadow-sm flex flex-col sm:flex-row gap-4 items-center fade-in relative">
                    <button onclick="window.removeTask(${i})" class="absolute -top-2 -right-2 w-7 h-7 bg-white shadow rounded-full text-red-500 font-black border border-slate-100">×</button>
                    <div class="flex items-center gap-3 min-w-[140px]">
                        <i class="${platformConfig[t.platform]?.icon} ${platformConfig[t.platform]?.color.replace('bg-', 'text-')} text-xl"></i>
                        <span class="font-black text-[10px] uppercase text-slate-500 tracking-widest">${t.label}</span>
                    </div>
                    <input value="${t.url}" oninput="currentTasks[${i}].url=this.value" class="flex-1 bg-slate-50 px-5 py-3 rounded-xl text-xs font-bold outline-none border border-transparent focus:border-blue-500" placeholder="Dán link (https://...)">
                </div>`).join('');
        }

        // --- DATABASE LOGIC ---
        window.saveL = async () => {
            const title = document.getElementById('bTitle').value || 'Không tiêu đề';
            const dest = document.getElementById('bDest').value;
            const destName = document.getElementById('bDestName').value || 'NHẬN LINK';
            if(!dest) return showToast("Dán link đích vào!", "error");
            if(currentTasks.length === 0) return showToast("Chọn ít nhất 1 nhiệm vụ!", "error");

            const btn = document.getElementById('btnSave'); btn.disabled = true; btn.innerText = "ĐANG TẠO...";
            try {
                const newDoc = await addDoc(collection(db, "links"), { title, tasks: currentTasks, createdAt: serverTimestamp(), views: 0, isActive: true });
                await setDoc(doc(db, "an_link", newDoc.id), { destUrl: dest, destName: destName });
                showToast("Đã tạo liên kết thành công!", "success");
                window.resetForm(); window.switchTab('manage');
            } catch(e) { showToast("Lỗi hệ thống!", "error"); }
            finally { btn.disabled = false; btn.innerText = "Tạo liên kết"; }
        };

        window.resetForm = () => { currentTasks = []; document.getElementById('bTitle').value = ""; document.getElementById('bDest').value = ""; renderTaskInputs(); };

        async function loadHistory() {
            const snap = await getDocs(query(collection(db, "links"), orderBy("createdAt", "desc")));
            const list = document.getElementById('history'); list.innerHTML = '';
            for (const d of snap.docs) {
                const data = d.data();
                const secret = await getDoc(doc(db, "an_link", d.id));
                const dest = secret.exists() ? secret.data().destUrl : "N/A";
                const shareUrl = `${window.location.origin}${window.location.pathname}?id=${d.id}`;
                list.innerHTML += `<div class="p-6 bg-slate-50 rounded-[2rem] flex justify-between items-center group border border-transparent hover:border-blue-100 hover:bg-white transition-all">
                    <div class="truncate mr-4 flex-1">
                        <b class="text-sm text-slate-800 uppercase font-black tracking-tight">${data.title}</b> 
                        <span class="bg-red-50 text-red-600 px-2.5 py-1 rounded-full font-black text-[9px] ml-2">${data.views} VIEWS</span><br>
                        <p class="text-[9px] text-emerald-600 font-bold mt-1 truncate">Đích: ${dest}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.toggleL('${d.id}', ${data.isActive})" class="w-10 h-10 bg-white ${data.isActive ? 'text-emerald-500' : 'text-slate-300'} rounded-xl shadow-sm hover:bg-slate-900 transition-all flex items-center justify-center"><i class="fa-solid fa-power-off"></i></button>
                        <button onclick="navigator.clipboard.writeText('${shareUrl}'); showToast('Đã copy!')" class="w-10 h-10 bg-white text-blue-500 rounded-xl shadow-sm hover:bg-blue-600 hover:text-white transition-all flex items-center justify-center"><i class="fa-solid fa-copy"></i></button>
                        <button onclick="window.delL('${d.id}')" class="w-10 h-10 bg-white text-red-500 rounded-xl shadow-sm hover:bg-red-600 hover:text-white transition-all flex items-center justify-center"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
            }
        }
        window.toggleL = async (id, cur) => { await updateDoc(doc(db, "links", id), { isActive: !cur }); loadHistory(); };
        window.delL = async (id) => { if(confirm("Xóa vĩnh viễn?")) { await deleteDoc(doc(db, "links", id)); await deleteDoc(doc(db, "an_link", id)); loadHistory(); } };

        // --- GIAO DIỆN USER (image_145ee7.png) ---
        async function loadUserPage() {
            const snap = await getDoc(doc(db, "links", linkId));
            if (!snap.exists() || snap.data().isActive === false) { container.innerHTML = "Link không khả dụng."; return; }
            const data = snap.data();
            updateDoc(doc(db, "links", linkId), { views: increment(1) });
            
            container.innerHTML = `
            <div class="max-w-xl mx-auto fade-in">
                <div class="bg-white p-12 rounded-[3.5rem] shadow-2xl text-center border border-slate-50">
                    <h1 class="text-4xl font-black text-slate-800 mb-2 uppercase tracking-tighter">${data.title}</h1>
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.4em] mb-12 italic">Hoàn thành các bước để nhận link</p>
                    <div id="taskListContent" class="space-y-4"></div>
                    <button id="unlock-btn" class="w-full py-6 mt-10 rounded-3xl font-black text-white bg-slate-100 cursor-not-allowed uppercase text-[11px] border-b-4 border-slate-200">Đang bị khóa</button>
                </div>
            </div>`;
            renderUserTasks(data.tasks);
        }

        function renderUserTasks(tasks) {
            const list = document.getElementById('taskListContent');
            list.innerHTML = tasks.map((t, i) => {
                const isDone = completedSet.has(i), isLocked = i > 0 && !completedSet.has(i - 1);
                const conf = platformConfig[t.platform] || { color: 'bg-slate-700', icon: 'fa-solid fa-link', label: 'Nhiệm vụ' };
                return `
                <div onclick="${!isDone && !isLocked ? `window.doTask(${i},'${t.url}')` : ''}" 
                     class="p-6 rounded-[2rem] flex justify-between items-center transition-all ${isDone ? 'bg-emerald-50 border-emerald-100' : isLocked ? 'bg-slate-50 opacity-40 grayscale cursor-not-allowed' : 'bg-slate-50 hover:bg-white hover:shadow-xl hover:scale-[1.02] cursor-pointer'} border-2 border-transparent">
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-white shadow-xl ${isDone ? 'bg-emerald-500' : isLocked ? 'bg-slate-300' : conf.color}">
                            <i class="${conf.icon} text-2xl"></i>
                        </div>
                        <div class="text-left">
                            <p class="text-[9px] font-black uppercase tracking-widest ${isDone ? 'text-emerald-500' : 'text-slate-400'}">${t.platform.toUpperCase()}</p>
                            <h4 class="font-black text-slate-800 text-sm tracking-tight">${t.label}</h4>
                        </div>
                    </div>
                    <div class="${isDone ? 'text-emerald-500' : 'text-slate-300'}">
                        <i class="fa-solid ${isDone ? 'fa-circle-check text-2xl' : isLocked ? 'fa-lock' : 'fa-circle-chevron-right text-xs'}"></i>
                    </div>
                </div>`;
            }).join('');
            
            if (completedSet.size >= tasks.length && tasks.length > 0) {
                const btn = document.getElementById('unlock-btn');
                btn.className = "w-full py-6 mt-10 rounded-3xl font-black text-white bg-gradient-to-r from-blue-600 to-indigo-600 shadow-xl shadow-blue-200 cursor-pointer animate-pulse uppercase text-[11px] border-b-4 border-blue-800";
                btn.innerHTML = `Nhận Link Ngay`;
                btn.onclick = async () => {
                    const secret = await getDoc(doc(db, "an_link", linkId));
                    const tokenId = Math.random().toString(36).substring(2, 15);
                    await setDoc(doc(db, "link_gioi_han", tokenId), { destUrl: secret.data().destUrl, expireAt: Date.now() + 30000, used: false });
                    window.location.href = window.location.pathname + `?id=${linkId}&token=${tokenId}`;
                };
            }
        }
        window.doTask = (i, url) => { window.open(url, '_blank'); setTimeout(() => { completedSet.add(i); loadUserPage(); }, 7000); };
    </script>
</body>
</html>

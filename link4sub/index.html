<!DOCTYPE html>
<html dir="ltr" lang="vi">
<head>
    <title>Link4Sub Premium - Super Secure</title>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://link4sub.com/home/css/style.css?v=22025">
    <style>
        body { font-family: 'Inter', sans-serif !important; -webkit-user-select: none; user-select: none; }
        .btn-hover-up:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(237, 20, 61, 0.3); }
        .my-loader { border-top-color: #ed143d; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { min-width: 250px; padding: 12px 20px; border-radius: 8px; color: white; font-size: 14px; animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="bg-[#f7f7fc]">
    <div id="toast-container"></div>

    <div class="fixed top-0 left-0 w-full bg-white shadow-sm z-50 h-16 flex items-center justify-between px-6">
        <div class="flex items-center gap-2">
            <div class="bg-red-600 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold"><i class="fa-solid fa-link"></i></div>
            <span class="font-bold text-gray-800 text-lg">Link4Sub Admin</span>
        </div>
    </div>

    <div class="min-h-screen pt-24 pb-10 px-4 flex flex-col items-center">
        <div id="mainContainer" class="w-full max-w-5xl">
            <div class="flex justify-center py-20"><div class="my-loader rounded-full border-4 h-12 w-12"></div></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, getDoc, deleteDoc, updateDoc, setDoc, increment, serverTimestamp, query, orderBy } 
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMYvnDTyzfBIAFTuB9VLPYN-YiFtNov6c", 
            authDomain: "linksubproject.firebaseapp.com",
            projectId: "linksubproject",
            storageBucket: "linksubproject.firebasestorage.app",
            messagingSenderId: "899237330148",
            appId: "1:899237330148:web:13bf3cf081f1cb9dc808f1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const linkId = urlParams.get('id');
        const container = document.getElementById('mainContainer');
        let currentTasks = [];
        let completedSet = new Set();
        let currentLinkData = null;

        window.showToast = (msg, type='info') => {
            const t = document.createElement('div');
            t.className = `toast p-4 ${type === 'success' ? 'bg-green-500' : 'bg-blue-500'}`;
            t.innerText = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        };

        const platformConfig = {
            youtube: { color: 'bg-red-600', icon: 'fa-youtube' },
            facebook: { color: 'bg-blue-600', icon: 'fa-facebook' }
        };

        // --- 1. XỬ LÝ VÉ TRUY CẬP (TOKEN) KHI TẢI TRANG ---
        async function checkToken() {
            const token = urlParams.get('token');
            if (token) {
                try {
                    const tokenSnap = await getDoc(doc(db, "link_gioi_han", token));
                    if (tokenSnap.exists()) {
                        const data = tokenSnap.data();
                        if (!data.used && Date.now() < data.expireAt) {
                            await updateDoc(doc(db, "link_gioi_han", token), { used: true });
                            window.location.href = data.destUrl;
                            return true;
                        }
                    }
                    alert("Link hết hạn hoặc không hợp lệ!");
                    window.location.href = window.location.pathname + `?id=${linkId}`;
                } catch(e) { console.error(e); }
            }
            return false;
        }

        async function init() {
            const hasToken = await checkToken();
            if (hasToken) return;

            if (linkId) loadUserPage();
            else onAuthStateChanged(auth, u => u ? renderAdmin() : renderLogin());
        }
        init();

        // --- 2. GIAO DIỆN NGƯỜI DÙNG ---
        async function loadUserPage() {
            const snap = await getDoc(doc(db, "links", linkId));
            if (!snap.exists() || snap.data().isActive === false) {
                container.innerHTML = `<div class="bg-white p-10 rounded-xl shadow text-center">Link không tồn tại hoặc đã bị tắt.</div>`;
                return;
            }
            currentLinkData = snap.data();
            updateDoc(doc(db, "links", linkId), { views: increment(1) });
            renderTasks();
        }

        function renderTasks() {
            const tasks = currentLinkData.tasks || [];
            let html = tasks.map((t, i) => {
                const isDone = completedSet.has(i);
                const isLocked = i > 0 && !completedSet.has(i - 1);
                const conf = platformConfig[t.platform] || { color: 'bg-gray-600', icon: 'fa-link' };
                return `<div onclick="${!isDone && !isLocked ? `doTask(${i},'${t.url}')` : ''}" class="p-4 rounded-lg mb-3 flex justify-between text-white ${isDone ? 'bg-green-500' : isLocked ? 'bg-gray-300 opacity-50' : conf.color + ' cursor-pointer'}">
                    <span><i class="fa-brands ${conf.icon} mr-2"></i>${t.label}</span>
                    <i class="fa-solid ${isDone ? 'fa-check' : isLocked ? 'fa-lock' : 'fa-arrow-right'}"></i>
                </div>`;
            }).join('');

            container.innerHTML = `<div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-lg">
                <h1 class="text-xl font-bold mb-6 text-center">${currentLinkData.title}</h1>
                ${html}
                <button id="unlock-btn" class="w-full py-4 mt-4 rounded-lg font-bold text-white bg-gray-400 opacity-50">ĐANG KHÓA</button>
            </div>`;
            
            if (completedSet.size >= tasks.length) {
                const btn = document.getElementById('unlock-btn');
                btn.className = "w-full py-4 mt-4 rounded-lg font-bold text-white bg-green-500 animate-pulse cursor-pointer";
                btn.innerText = "NHẬN LINK";
                btn.onclick = async () => {
                    showToast("Đang tạo vé truy cập...");
                    const secret = await getDoc(doc(db, "an_link", linkId));
                    const tokenId = Math.random().toString(36).substring(2, 15);
                    await setDoc(doc(db, "link_gioi_han", tokenId), {
                        destUrl: secret.data().destUrl,
                        expireAt: Date.now() + 30000,
                        used: false
                    });
                    window.location.href = window.location.pathname + `?id=${linkId}&token=${tokenId}`;
                };
            }
        }
        window.doTask = (i, url) => { window.open(url, '_blank'); setTimeout(() => { completedSet.add(i); renderTasks(); }, 7000); };

        // --- 3. GIAO DIỆN ADMIN ---
        function renderLogin() {
            container.innerHTML = `<div class="max-w-sm mx-auto bg-white p-8 rounded-xl shadow-lg">
                <h2 class="text-xl font-bold mb-4">Admin Login</h2>
                <input id="email" type="email" placeholder="Email" class="w-full p-2 border mb-2 rounded">
                <input id="pass" type="password" placeholder="Pass" class="w-full p-2 border mb-4 rounded">
                <button onclick="login()" class="w-full bg-red-600 text-white p-2 rounded font-bold">VÀO HỆ THỐNG</button>
            </div>`;
            window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
        }

        async function renderAdmin() {
            container.innerHTML = `<div class="bg-white p-6 rounded-xl shadow-lg">
                <div class="flex justify-between mb-6"><b>Quản lý Link</b> <button onclick="signOut(auth)" class="text-xs text-red-500 underline">Đăng xuất</button></div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1 border-r pr-6">
                        <input id="bTitle" type="text" placeholder="Tiêu đề" class="w-full p-2 border mb-2 rounded text-sm">
                        <input id="bDest" type="text" placeholder="Link đích bí mật" class="w-full p-2 border border-green-400 mb-2 rounded text-sm bg-green-50">
                        <div class="flex gap-2 mb-4">
                            <button onclick="addT('youtube')" class="bg-red-500 text-white p-2 rounded text-xs">+ YouTube</button>
                        </div>
                        <div id="bTaskList" class="space-y-2 mb-4"></div>
                        <button onclick="saveL()" class="w-full bg-red-600 text-white py-3 rounded font-bold">LƯU LINK</button>
                    </div>
                    <div class="lg:col-span-2">
                        <h3 class="font-bold mb-4 text-sm">Danh sách link (Admin có thể xem link gốc)</h3>
                        <div id="history" class="space-y-3 max-h-[500px] overflow-y-auto pr-2"></div>
                    </div>
                </div>
            </div>`;
            loadHistory();
        }

        window.addT = (p) => { currentTasks.push({platform: p, label: 'Subscribe channel', url: ''}); renderAdminTasks(); };
        function renderAdminTasks() {
            document.getElementById('bTaskList').innerHTML = currentTasks.map((t, i) => `
                <div class="p-2 border rounded bg-gray-50 text-xs">
                    <input value="${t.label}" onchange="currentTasks[${i}].label=this.value" class="w-full mb-1 border-b">
                    <input value="${t.url}" onchange="currentTasks[${i}].url=this.value" placeholder="Link nhiệm vụ" class="w-full bg-transparent">
                </div>`).join('');
        }

        async function saveL() {
            const title = document.getElementById('bTitle').value;
            const dest = document.getElementById('bDest').value;
            const newDoc = await addDoc(collection(db, "links"), { title, tasks: currentTasks, createdAt: serverTimestamp(), views: 0, isActive: true });
            await setDoc(doc(db, "an_link", newDoc.id), { destUrl: dest });
            showToast("Đã lưu!", "success");
            currentTasks = []; renderAdmin();
        }

        async function loadHistory() {
            const q = query(collection(db, "links"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            const list = document.getElementById('history');
            list.innerHTML = '';
            
            for (const d of snap.docs) {
                const data = d.data();
                // Admin lấy link gốc từ kho an_link để hiển thị
                const secret = await getDoc(doc(db, "an_link", d.id));
                const dest = secret.exists() ? secret.data().destUrl : "N/A";
                const shareUrl = `${window.location.origin}${window.location.pathname}?id=${d.id}`;
                
                list.innerHTML += `<div class="p-4 border rounded-lg bg-gray-50 flex justify-between items-center text-xs">
                    <div class="flex-1 truncate mr-4">
                        <b class="text-sm">${data.title}</b> <span class="text-blue-500">(${data.views} views)</span><br>
                        <span class="text-gray-400">ID: ${d.id}</span><br>
                        <span class="text-green-600 font-medium">Link đích: ${dest}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleL('${d.id}', ${data.isActive})" class="${data.isActive ? 'text-green-500' : 'text-gray-400'}"><i class="fa-solid fa-power-off"></i></button>
                        <button onclick="navigator.clipboard.writeText('${shareUrl}'); showToast('Đã copy!')" class="text-blue-500"><i class="fa-copy fa-solid"></i></button>
                        <button onclick="delL('${d.id}')" class="text-red-500"><i class="fa-trash fa-solid"></i></button>
                    </div>
                </div>`;
            }
        }
        window.toggleL = async (id, cur) => { await updateDoc(doc(db, "links", id), { isActive: !cur }); loadHistory(); };
        window.delL = async (id) => { if(confirm("Xóa?")) { await deleteDoc(doc(db, "links", id)); await deleteDoc(doc(db, "an_link", id)); loadHistory(); } };
    </script>
</body>
</html>

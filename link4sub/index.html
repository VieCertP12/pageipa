<!DOCTYPE html>
<html dir="ltr" lang="vi">
<head>
    <title>Link4Sub Pro - Premium v4.0</title>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif !important; background-color: #f8fafc; color: #1e293b; -webkit-user-select: none; user-select: none; }
        .tab-active { color: #ef4444; border-bottom: 4px solid #ef4444; }
        .btn-premium { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.2); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .my-loader { border-top-color: #ef4444; animation: spinner 0.8s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; }
        .toast { min-width: 280px; padding: 18px 24px; border-radius: 20px; color: white; font-weight: 800; font-size: 13px; shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <nav class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-md z-50 h-20 flex items-center justify-between px-8 border-b border-slate-100 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-br from-red-500 to-rose-600 text-white w-10 h-10 rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-link text-lg"></i>
            </div>
            <span class="font-black text-slate-800 text-xl tracking-tighter">Link4Sub <span class="text-red-500">PRO</span></span>
        </div>
        <div id="nav-actions"></div>
    </nav>

    <main class="min-h-screen pt-28 pb-12 px-4 flex flex-col items-center">
        <div id="mainContainer" class="w-full max-w-6xl">
            <div class="flex flex-col items-center justify-center py-32">
                <div class="my-loader rounded-full border-4 border-slate-100 h-14 w-14 mb-4"></div>
                <p class="text-slate-300 font-black tracking-widest uppercase text-[9px]">Securing Connection...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, getDoc, deleteDoc, updateDoc, setDoc, increment, serverTimestamp, query, orderBy } 
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMYvnDTyzfBIAFTuB9VLPYN-YiFtNov6c", 
            authDomain: "linksubproject.firebaseapp.com",
            projectId: "linksubproject",
            storageBucket: "linksubproject.firebasestorage.app",
            messagingSenderId: "899237330148",
            appId: "1:899237330148:web:13bf3cf081f1cb9dc808f1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const urlParams = new URLSearchParams(window.location.search);
        const linkId = urlParams.get('id');
        const container = document.getElementById('mainContainer');
        let currentTasks = [];
        let completedSet = new Set();
        let currentLinkData = null;
        let editId = null;

        window.showToast = (msg, type='info') => {
            const t = document.createElement('div');
            const bg = type === 'success' ? 'bg-emerald-500' : type === 'error' ? 'bg-rose-500' : 'bg-slate-800';
            t.className = `toast ${bg} fade-in`;
            t.innerHTML = `<div class="flex items-center gap-3"><i class="fa-solid ${type==='success'?'fa-circle-check':'fa-circle-info'}"></i>${msg}</div>`;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 3000);
        };

        const platformConfig = {
            youtube_sub: { color: 'bg-[#FF0000]', icon: 'fa-youtube', label: 'Đăng ký kênh' },
            youtube_like: { color: 'bg-[#FF0000]', icon: 'fa-thumbs-up', label: 'Like Video' },
            youtube_cmt: { color: 'bg-[#FF0000]', icon: 'fa-comment-dots', label: 'Bình luận Video' },
            telegram: { color: 'bg-[#229ED9]', icon: 'fa-telegram', label: 'Tham gia Box' },
            facebook: { color: 'bg-[#1877F2]', icon: 'fa-facebook', label: 'Theo dõi Fanpage' },
            tiktok: { color: 'bg-black', icon: 'fa-tiktok', label: 'Follow TikTok' }
        };

        async function init() {
            const token = urlParams.get('token');
            if (token) {
                const tokenSnap = await getDoc(doc(db, "link_gioi_han", token));
                if (tokenSnap.exists() && !tokenSnap.data().used && Date.now() < tokenSnap.data().expireAt) {
                    await updateDoc(doc(db, "link_gioi_han", token), { used: true });
                    window.location.href = tokenSnap.data().destUrl;
                    return;
                }
            }
            if (linkId) loadUserPage();
            else onAuthStateChanged(auth, u => {
                const nav = document.getElementById('nav-actions');
                if(u) {
                    nav.innerHTML = `<button onclick="signOut(auth)" class="text-slate-400 font-bold text-xs hover:text-red-500 transition-colors uppercase">Thoát Quản Trị <i class="fa-solid fa-power-off ml-1"></i></button>`;
                    renderAdminDashboard();
                } else renderLogin();
            });
        }
        window.signOut = signOut;
        init();

        // --- USER PAGE ---
        async function loadUserPage() {
            const snap = await getDoc(doc(db, "links", linkId));
            if (!snap.exists() || snap.data().isActive === false) {
                container.innerHTML = `<div class="max-w-md mx-auto bg-white p-12 rounded-[2.5rem] shadow-xl text-center fade-in"><i class="fa-solid fa-ban text-slate-100 text-6xl mb-6"></i><h2 class="font-black text-slate-800">LIÊN KẾT ĐÃ KHÓA</h2></div>`;
                return;
            }
            currentLinkData = snap.data();
            updateDoc(doc(db, "links", linkId), { views: increment(1) });
            
            container.innerHTML = `
            <div class="max-w-xl mx-auto fade-in">
                <a href="https://muachungchi.com" target="_blank" class="block bg-slate-900 rounded-[2.5rem] p-7 mb-8 shadow-2xl relative overflow-hidden group btn-premium">
                    <div class="absolute -right-4 -top-4 w-32 h-32 bg-white/5 rounded-full blur-3xl group-hover:bg-white/10 transition-all"></div>
                    <div class="flex items-center justify-between relative z-10">
                        <div class="flex items-center gap-4 text-left">
                            <div class="bg-white/10 w-14 h-14 rounded-2xl flex items-center justify-center text-white text-3xl shadow-inner"><i class="fa-brands fa-apple"></i></div>
                            <div>
                                <h3 class="text-white font-black text-xl uppercase tracking-tighter">Muachungchi.com</h3>
                                <p class="text-slate-400 text-xs italic font-bold">Chứng chỉ iOS giá rẻ <span class="text-rose-500 underline decoration-2">150k/năm</span></p>
                            </div>
                        </div>
                        <div class="bg-rose-600 text-white px-6 py-3 rounded-2xl font-black text-[11px] uppercase tracking-widest">Mua Ngay</div>
                    </div>
                </a>

                <div class="bg-white p-12 rounded-[3rem] shadow-2xl shadow-slate-200 border border-slate-50 text-center">
                    <h1 class="text-4xl font-black text-slate-800 mb-2 tracking-tighter uppercase leading-none">${currentLinkData.title}</h1>
                    <div class="h-1.5 w-16 bg-red-600 mx-auto mb-6 rounded-full"></div>
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.4em] mb-12 italic">Cần hoàn thành các bước bên dưới</p>
                    
                    <div id="taskListContent"></div>

                    <button id="unlock-btn" class="w-full py-6 mt-10 rounded-3xl font-black text-white bg-slate-100 cursor-not-allowed uppercase tracking-[0.2em] text-[11px] border-b-4 border-slate-200">
                        <i class="fa-solid fa-lock mr-2 opacity-30"></i> Link đang bị khóa
                    </button>
                    <p class="mt-8 text-[9px] font-black text-slate-300 uppercase tracking-[0.3em]">Bảo mật bởi <span class="text-red-500">Link4Sub Pro</span></p>
                </div>
            </div>`;
            renderUserTasks(currentLinkData.tasks);
        }

        function renderUserTasks(tasks) {
            const list = document.getElementById('taskListContent');
            list.innerHTML = tasks.map((t, i) => {
                const isDone = completedSet.has(i), isLocked = i > 0 && !completedSet.has(i - 1);
                const conf = platformConfig[t.platform] || { color: 'bg-slate-700', icon: 'fa-link', label: 'Nhiệm vụ' };
                return `
                <div onclick="${!isDone && !isLocked ? `window.doTask(${i},'${t.url}')` : ''}" 
                     class="p-6 rounded-[2rem] flex justify-between items-center mb-4 transition-all duration-300 ${isDone ? 'bg-emerald-50' : isLocked ? 'bg-slate-50 opacity-40 grayscale cursor-not-allowed' : 'bg-slate-50 hover:bg-white hover:shadow-xl hover:scale-[1.02] cursor-pointer'} border-2 ${isDone ? 'border-emerald-100' : 'border-transparent'}">
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-white shadow-xl ${isDone ? 'bg-emerald-500 shadow-emerald-200' : isLocked ? 'bg-slate-300' : conf.color}">
                            <i class="fa-solid ${conf.icon} text-2xl"></i>
                        </div>
                        <div class="text-left">
                            <p class="text-[9px] font-black uppercase tracking-widest ${isDone ? 'text-emerald-500' : 'text-slate-400'}">${t.platform.replace('_', ' ')}</p>
                            <h4 class="font-black text-slate-800 text-sm tracking-tight">${t.label || conf.label}</h4>
                        </div>
                    </div>
                    <div class="${isDone ? 'text-emerald-500' : 'text-slate-300'}">
                        <i class="fa-solid ${isDone ? 'fa-circle-check text-2xl' : isLocked ? 'fa-lock' : 'fa-chevron-right text-sm'}"></i>
                    </div>
                </div>`;
            }).join('');
            
            if (completedSet.size >= tasks.length && tasks.length > 0) {
                const btn = document.getElementById('unlock-btn');
                btn.className = "w-full py-6 mt-10 rounded-3xl font-black text-white bg-gradient-to-r from-red-600 to-rose-600 shadow-xl shadow-rose-200 cursor-pointer animate-pulse uppercase tracking-[0.2em] text-[11px] btn-premium border-b-4 border-rose-800";
                btn.innerHTML = `<i class="fa-solid fa-unlock-keyhole mr-2"></i> Nhận Link Ngay`;
                btn.onclick = async () => {
                    const secret = await getDoc(doc(db, "an_link", linkId));
                    const tokenId = Math.random().toString(36).substring(2, 15);
                    await setDoc(doc(db, "link_gioi_han", tokenId), { destUrl: secret.data().destUrl, expireAt: Date.now() + 30000, used: false });
                    window.location.href = window.location.pathname + `?id=${linkId}&token=${tokenId}`;
                };
            }
        }
        window.doTask = (i, url) => { 
            if(!url || url === "") return showToast("Lỗi: Nhiệm vụ này chưa được dán link!", "error");
            window.open(url, '_blank'); 
            showToast("Đang xác minh 7 giây...", "info");
            setTimeout(() => { completedSet.add(i); loadUserPage(); }, 7000); 
        };

        // --- ADMIN DASHBOARD ---
        function renderLogin() {
            container.innerHTML = `<div class="max-w-sm mx-auto bg-white p-12 rounded-[3rem] shadow-2xl border border-slate-50 fade-in text-center mt-10">
                <h2 class="text-2xl font-black text-slate-800 mb-8 uppercase tracking-tighter">Admin Portal</h2>
                <input id="email" type="email" placeholder="Email Quản trị" class="w-full p-4 bg-slate-50 rounded-2xl mb-3 outline-none focus:ring-2 focus:ring-red-500/20 font-bold">
                <input id="pass" type="password" placeholder="Mật khẩu" class="w-full p-4 bg-slate-50 rounded-2xl mb-6 outline-none focus:ring-2 focus:ring-red-500/20 font-bold">
                <button onclick="window.login()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs btn-premium">Vào hệ thống</button>
            </div>`;
            window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(e => showToast("Sai tài khoản!", "error"));
        }

        async function renderAdminDashboard() {
            container.innerHTML = `
            <div class="fade-in w-full">
                <div class="flex justify-center mb-10 gap-10">
                    <button onclick="window.switchTab('create')" id="tab-create" class="pb-3 font-black text-sm uppercase tracking-[0.2em] tab-active transition-all">Tạo Link Mới</button>
                    <button onclick="window.switchTab('manage')" id="tab-manage" class="pb-3 font-black text-sm uppercase tracking-[0.2em] text-slate-300 hover:text-slate-500 transition-all">Quản lý Link</button>
                </div>

                <div id="section-create" class="max-w-4xl mx-auto bg-white p-12 rounded-[3.5rem] shadow-2xl border border-slate-50">
                    <div class="mb-10 text-center">
                        <h3 class="font-black text-2xl text-slate-800 tracking-tight uppercase" id="form-title">THIẾT KẾ LINK BẢO MẬT</h3>
                    </div>
                    
                    <div class="space-y-6">
                        <input id="bTitle" type="text" placeholder="Tiêu đề hiển thị (Ví dụ: Esign Pro 2025...)" class="w-full p-6 bg-slate-50 border-2 border-transparent focus:border-red-500 focus:bg-white rounded-[2rem] outline-none transition-all font-black text-xl">
                        <input id="bDest" type="text" placeholder="Link đích bí mật (itms-services...)" class="w-full p-6 bg-emerald-50 border-2 border-transparent focus:border-emerald-500 focus:bg-white rounded-[2rem] outline-none transition-all font-bold text-sm text-emerald-600">

                        <div class="pt-6 border-t border-slate-50">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 text-center">Click để thêm nhiệm vụ</p>
                            <div class="grid grid-cols-3 sm:grid-cols-6 gap-3 mb-8">
                                <button onclick="window.addT('youtube_sub')" class="bg-red-50 text-red-600 p-4 rounded-2xl font-black text-[9px] hover:bg-red-600 hover:text-white transition-all shadow-sm flex flex-col items-center gap-1"><i class="fa-solid fa-youtube text-lg"></i> SUB</button>
                                <button onclick="window.addT('youtube_like')" class="bg-red-50 text-red-600 p-4 rounded-2xl font-black text-[9px] hover:bg-red-600 hover:text-white transition-all shadow-sm flex flex-col items-center gap-1"><i class="fa-solid fa-thumbs-up text-lg"></i> LIKE</button>
                                <button onclick="window.addT('youtube_cmt')" class="bg-red-50 text-red-600 p-4 rounded-2xl font-black text-[9px] hover:bg-red-600 hover:text-white transition-all shadow-sm flex flex-col items-center gap-1"><i class="fa-solid fa-comment-dots text-lg"></i> CMT</button>
                                <button onclick="window.addT('telegram')" class="bg-blue-50 text-blue-500 p-4 rounded-2xl font-black text-[9px] hover:bg-blue-500 hover:text-white transition-all shadow-sm flex flex-col items-center gap-1"><i class="fa-solid fa-telegram text-lg"></i> BOX</button>
                                <button onclick="window.addT('facebook')" class="bg-indigo-50 text-indigo-600 p-4 rounded-2xl font-black text-[9px] hover:bg-indigo-600 hover:text-white transition-all shadow-sm flex flex-col items-center gap-1"><i class="fa-solid fa-facebook text-lg"></i> FB</button>
                                <button onclick="window.addT('tiktok')" class="bg-slate-100 text-slate-800 p-4 rounded-2xl font-black text-[9px] hover:bg-slate-800 hover:text-white transition-all shadow-sm flex flex-col items-center gap-1"><i class="fa-solid fa-tiktok text-lg"></i> TIKTOK</button>
                            </div>
                            <div id="bTaskList" class="space-y-3"></div>
                        </div>

                        <div class="flex gap-4 pt-6">
                            <button id="btnSave" onclick="window.saveL()" class="flex-1 bg-slate-900 text-white py-6 rounded-[2.5rem] font-black uppercase tracking-widest text-xs btn-premium shadow-2xl">Lưu Link Bảo Mật</button>
                            <button id="btnCancel" onclick="window.cancelEdit()" class="hidden bg-slate-200 text-slate-600 px-10 rounded-[2.5rem] font-black uppercase text-[10px] tracking-widest transition-all">Hủy</button>
                        </div>
                    </div>
                </div>

                <div id="section-manage" class="hidden max-w-5xl mx-auto fade-in">
                    <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-50">
                        <div class="flex justify-between items-center mb-8 border-b border-slate-50 pb-6">
                            <h3 class="font-black text-slate-800 text-lg uppercase tracking-tight">KHO LƯU TRỮ LINK</h3>
                            <button onclick="window.loadHistory()" class="text-[10px] font-black text-blue-500 uppercase tracking-widest hover:underline"><i class="fa-solid fa-rotate mr-1"></i> Làm mới</button>
                        </div>
                        <div id="history" class="space-y-4"></div>
                    </div>
                </div>
            </div>`;
            loadHistory();
        }

        window.switchTab = (tab) => {
            document.getElementById('section-create').classList.toggle('hidden', tab !== 'create');
            document.getElementById('section-manage').classList.toggle('hidden', tab !== 'manage');
            document.getElementById('tab-create').className = tab === 'create' ? "pb-3 font-black text-sm uppercase tracking-[0.2em] tab-active" : "pb-3 font-black text-sm uppercase tracking-[0.2em] text-slate-300";
            document.getElementById('tab-manage').className = tab === 'manage' ? "pb-3 font-black text-sm uppercase tracking-[0.2em] tab-active" : "pb-3 font-black text-sm uppercase tracking-[0.2em] text-slate-300";
        };

        window.addT = (p) => { currentTasks.push({platform: p, label: platformConfig[p].label, url: ''}); renderAdminTasks(); };
        window.removeT = (i) => { currentTasks.splice(i, 1); renderAdminTasks(); };
        function renderAdminTasks() {
            document.getElementById('bTaskList').innerHTML = currentTasks.map((t, i) => `
                <div class="p-4 bg-slate-50 rounded-2xl relative border-2 border-white shadow-sm flex flex-col sm:flex-row gap-4 items-center animate-fade-in">
                    <button onclick="window.removeT(${i})" class="absolute -top-2 -right-2 w-8 h-8 bg-white shadow-md rounded-full text-red-500 font-black flex items-center justify-center border border-slate-100">×</button>
                    <div class="flex items-center gap-3 min-w-[130px]">
                        <i class="fa-solid ${platformConfig[t.platform]?.icon} ${platformConfig[t.platform]?.color.replace('bg-', 'text-')} text-lg"></i>
                        <span class="font-black text-[10px] uppercase tracking-widest text-slate-500">${t.platform.replace('youtube_', '')}</span>
                    </div>
                    <input value="${t.label}" onchange="currentTasks[${i}].label=this.value" class="flex-1 bg-white px-5 py-3 rounded-2xl text-xs font-bold outline-none border border-slate-100 focus:border-red-500" placeholder="Tên hiển thị">
                    <input value="${t.url}" onchange="currentTasks[${i}].url=this.value" class="flex-[2] bg-white px-5 py-3 rounded-2xl text-xs font-bold outline-none border border-slate-100 focus:border-red-500" placeholder="Dán link (Bắt buộc)">
                </div>`).join('');
        }

        window.saveL = async () => {
            const title = document.getElementById('bTitle').value, dest = document.getElementById('bDest').value;
            if(!title || !dest) return showToast("Vui lòng điền tiêu đề và link đích!", "error");
            if(currentTasks.length === 0) return showToast("Vui lòng thêm ít nhất 1 nhiệm vụ!", "error");
            if(currentTasks.some(t => t.url === "")) return showToast("Lỗi: Link nhiệm vụ không được để trống!", "error");

            const btn = document.getElementById('btnSave'); btn.disabled = true; btn.innerText = "ĐANG LƯU...";
            try {
                let finalId = editId;
                if (!editId) {
                    const newDoc = await addDoc(collection(db, "links"), { title, tasks: currentTasks, createdAt: serverTimestamp(), views: 0, isActive: true });
                    finalId = newDoc.id;
                } else {
                    await updateDoc(doc(db, "links", editId), { title, tasks: currentTasks });
                }
                await setDoc(doc(db, "an_link", finalId), { destUrl: dest });
                showToast("Đã lưu dữ liệu bảo mật thành công!", "success");
                window.cancelEdit();
            } catch(e) { showToast("Lỗi hệ thống database!", "error"); }
            finally { btn.disabled = false; btn.innerText = "Lưu Link Bảo Mật"; }
        };

        window.loadEdit = async (id) => {
            const snap = await getDoc(doc(db, "links", id));
            const secret = await getDoc(doc(db, "an_link", id));
            if(snap.exists()){
                editId = id;
                window.switchTab('create');
                document.getElementById('bTitle').value = snap.data().title;
                document.getElementById('bDest').value = secret.data().destUrl;
                currentTasks = snap.data().tasks || [];
                renderAdminTasks();
                document.getElementById('form-title').innerText = "CẬP NHẬT LINK";
                document.getElementById('btnCancel').classList.remove('hidden');
                document.getElementById('btnSave').innerText = "Lưu Thay Đổi";
                showToast("Đã tải dữ liệu sửa");
            }
        };

        window.cancelEdit = () => {
            editId = null; currentTasks = [];
            document.getElementById('bTitle').value = ""; document.getElementById('bDest').value = "";
            document.getElementById('form-title').innerText = "THIẾT KẾ LINK BẢO MẬT";
            document.getElementById('btnCancel').classList.add('hidden');
            document.getElementById('btnSave').innerText = "Lưu Link Bảo Mật";
            renderAdminTasks(); loadHistory();
        };

        async function loadHistory() {
            const snap = await getDocs(query(collection(db, "links"), orderBy("createdAt", "desc")));
            const list = document.getElementById('history'); list.innerHTML = '';
            for (const d of snap.docs) {
                const data = d.data();
                const secret = await getDoc(doc(db, "an_link", d.id));
                const dest = secret.exists() ? secret.data().destUrl : "N/A";
                const shareUrl = `${window.location.origin}${window.location.pathname}?id=${d.id}`;
                list.innerHTML += `
                <div class="p-6 bg-slate-50 rounded-[2.5rem] flex flex-col sm:flex-row justify-between items-center border border-slate-100 hover:bg-white hover:shadow-2xl transition-all">
                    <div class="truncate mr-4 flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <b class="text-sm text-slate-800 uppercase font-black tracking-tight">${data.title}</b> 
                            <span class="bg-red-50 text-red-500 px-3 rounded-full font-black text-[8px] uppercase">${data.views} lượt xem</span>
                        </div>
                        <p class="text-[9px] text-emerald-600 font-bold truncate">Gốc: ${dest}</p>
                    </div>
                    <div class="flex gap-2 mt-4 sm:mt-0">
                        <button onclick="window.loadEdit('${d.id}')" class="w-11 h-11 bg-white text-orange-500 rounded-2xl shadow-sm hover:bg-orange-500 hover:text-white transition-all flex items-center justify-center"><i class="fa-solid fa-pen"></i></button>
                        <button onclick="window.toggleL('${d.id}', ${data.isActive})" class="w-11 h-11 bg-white ${data.isActive ? 'text-green-500' : 'text-slate-300'} rounded-2xl shadow-sm hover:bg-slate-900 hover:text-white transition-all flex items-center justify-center"><i class="fa-solid fa-power-off"></i></button>
                        <button onclick="navigator.clipboard.writeText('${shareUrl}'); showToast('Đã copy link chia sẻ!')" class="w-11 h-11 bg-white text-blue-500 rounded-2xl shadow-sm hover:bg-blue-500 hover:text-white transition-all flex items-center justify-center"><i class="fa-solid fa-copy"></i></button>
                        <button onclick="window.delL('${d.id}')" class="w-11 h-11 bg-white text-red-500 rounded-2xl shadow-sm hover:bg-red-500 hover:text-white transition-all flex items-center justify-center"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
            }
        }
        window.toggleL = async (id, cur) => { await updateDoc(doc(db, "links", id), { isActive: !cur }); loadHistory(); };
        window.delL = async (id) => { if(confirm("Xóa vĩnh viễn?")) { await deleteDoc(doc(db, "links", id)); await deleteDoc(doc(db, "an_link", id)); loadHistory(); } };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link4Sub Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel để biên dịch JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Style bổ sung -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Animation cho dropdown */
        .dropdown-enter {
            animation: slideDown 0.2s ease-out forwards;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        
        // Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, getDoc, doc, updateDoc, 
            serverTimestamp, increment 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { 
            getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Import Lucide Icons
        import { 
            Plus, Link as LinkIcon, Lock, Unlock, CheckCircle2, 
            Settings, Zap, Target, Youtube, Facebook, Twitter, 
            Instagram, MessageCircle, Send, ArrowRight, Loader2, Copy,
            ThumbsUp, Heart, Bell, MessageSquare, ChevronDown
        } from 'https://esm.sh/lucide-react@0.294.0';

        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCMYvnDTyzfBIAFTuB9VLPYN-YiFtNov6c", 
            authDomain: "linksubproject.firebaseapp.com",
            projectId: "linksubproject",
            storageBucket: "linksubproject.firebasestorage.app",
            messagingSenderId: "899237330148",
            appId: "1:899237330148:web:13bf3cf081f1cb9dc808f1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- CUSTOM ICONS ---
        const TikTokIcon = () => (
            <svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>
        );
        const ZaloIcon = () => <span className="font-black text-[10px] tracking-tighter">ZALO</span>;
        const DiscordIcon = () => (
             <svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.086 2.157 2.419 0 1.334-.956 2.42-2.157 2.42zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.086 2.157 2.419 0 1.334-.946 2.42-2.157 2.42z"/></svg>
        );

        // --- HELPER COMPONENTS ---
        // Helper để lấy Icon dựa trên loại task
        const getTaskIcon = (platform, actionType, className="w-5 h-5") => {
            if (platform === 'youtube') {
                switch(actionType) {
                    case 'sub1': return <Youtube className={className} />;
                    case 'sub2': return <Bell className={className} />;
                    case 'like1': return <ThumbsUp className={className} />;
                    case 'like2': return <Heart className={className} />;
                    case 'comment1': return <MessageCircle className={className} />;
                    case 'comment2': return <MessageSquare className={className} />;
                    default: return <Youtube className={className} />;
                }
            }
            if (platform === 'telegram') return <Send className={className} />;
            if (platform === 'facebook') return <Facebook className={className} />;
            if (platform === 'tiktok') return <TikTokIcon />;
            if (platform === 'instagram') return <Instagram className={className} />;
            if (platform === 'x') return <Twitter className={className} />;
            if (platform === 'discord') return <DiscordIcon />;
            if (platform === 'zalo') return <ZaloIcon />;
            return <LinkIcon className={className} />;
        };

        const getTaskColor = (platform, actionType) => {
            if (platform === 'youtube') return 'bg-red-600';
            if (platform === 'telegram') return 'bg-sky-500';
            if (platform === 'facebook') return 'bg-blue-600';
            if (platform === 'tiktok') return 'bg-black';
            if (platform === 'instagram') return 'bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-500';
            if (platform === 'x') return 'bg-black';
            if (platform === 'discord') return 'bg-indigo-600';
            if (platform === 'zalo') return 'bg-blue-500';
            return 'bg-gray-700';
        };

        // --- MAIN COMPONENTS ---

        // 1. ADMIN VIEW
        const AdminView = ({ user, onLogout }) => {
            const [loading, setLoading] = useState(false);
            const [createdLink, setCreatedLink] = useState(null);
            
            // UI State
            const [ytMenuOpen, setYtMenuOpen] = useState(false);

            // Form State
            const [title, setTitle] = useState('');
            const [subTitle, setSubTitle] = useState('');
            const [destUrl, setDestUrl] = useState('');
            const [destName, setDestName] = useState('');
            const [tasks, setTasks] = useState([]);

            const addSimpleTask = (platform) => {
                let label = '', placeholder = '';
                switch(platform) {
                    case 'telegram': label = 'Tham gia Telegram'; placeholder = 'Link nhóm...'; break;
                    case 'tiktok': label = 'Follow TikTok'; placeholder = 'Link profile...'; break;
                    case 'facebook': label = 'Like Fanpage'; placeholder = 'Link page...'; break;
                    case 'instagram': label = 'Follow Instagram'; placeholder = 'Link profile...'; break;
                    case 'discord': label = 'Tham gia Discord'; placeholder = 'Invite link...'; break;
                    default: label = 'Truy cập liên kết'; placeholder = 'https://...';
                }
                setTasks([...tasks, { platform, label, url: '', placeholder, id: Date.now() }]);
            };

            const addYtTask = (type) => {
                let label = '', placeholder = 'Link Video/Kênh...';
                switch(type) {
                    case 'sub1': label = 'Đăng ký Kênh'; break;
                    case 'sub2': label = 'Bấm Chuông'; break;
                    case 'like1': label = 'Like Video'; break;
                    case 'like2': label = 'Thả Tim Video'; break;
                    case 'comment1': label = 'Bình luận'; break;
                    case 'comment2': label = 'Bình luận (Vuông)'; break;
                }
                setTasks([...tasks, { platform: 'youtube', actionType: type, label, url: '', placeholder, id: Date.now() }]);
                setYtMenuOpen(false);
            };

            const removeTask = (id) => setTasks(tasks.filter(t => t.id !== id));
            
            const updateTask = (id, field, value) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, [field]: value } : t));
            };

            const handleCreate = async () => {
                if (!title || !destUrl || tasks.length === 0) {
                    alert("Vui lòng nhập tiêu đề, link đích và ít nhất 1 nhiệm vụ!");
                    return;
                }
                setLoading(true);
                try {
                    const docRef = await addDoc(collection(db, "links"), {
                        title, subTitle, destUrl,
                        destName: destName || "Liên kết mở khóa",
                        tasks: tasks.map(({id, ...rest}) => rest),
                        createdAt: serverTimestamp(),
                        creatorId: user.uid,
                        isActive: true, views: 0
                    });
                    setCreatedLink(`${window.location.origin}${window.location.pathname}?id=${docRef.id}`);
                } catch (error) {
                    alert("Lỗi: " + error.message);
                } finally {
                    setLoading(false);
                }
            };

            const resetForm = () => {
                setTitle(''); setSubTitle(''); setDestUrl(''); setDestName(''); setTasks([]); setCreatedLink(null);
            };

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 font-sans">
                    <div className="max-w-4xl mx-auto p-4 md:p-8">
                        <div className="flex justify-between items-center mb-8">
                            <div className="flex items-center gap-2">
                                <div className="bg-blue-600 p-2 rounded-lg"><LinkIcon className="text-white w-5 h-5" /></div>
                                <h1 className="text-2xl font-black text-gray-800 tracking-tight">Link4Sub<span className="text-blue-600">Pro</span></h1>
                            </div>
                            <button onClick={onLogout} className="text-sm font-semibold text-gray-500 hover:text-red-500">Đăng xuất</button>
                        </div>

                        {createdLink ? (
                            <div className="bg-white rounded-3xl p-8 shadow-xl border border-green-100 text-center animate-in fade-in zoom-in duration-300">
                                <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6"><CheckCircle2 className="w-10 h-10 text-green-600" /></div>
                                <h2 className="text-2xl font-bold text-gray-800 mb-2">Liên kết đã sẵn sàng!</h2>
                                <div className="flex gap-2 max-w-md mx-auto bg-gray-50 p-2 rounded-xl border mb-6">
                                    <input type="text" readOnly value={createdLink} className="flex-1 bg-transparent px-3 text-sm font-medium outline-none text-gray-600" />
                                    <button onClick={() => { navigator.clipboard.writeText(createdLink); alert("Đã copy!"); }} className="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-lg"><Copy className="w-4 h-4" /></button>
                                </div>
                                <button onClick={resetForm} className="text-blue-600 font-bold hover:underline">Tạo liên kết mới</button>
                            </div>
                        ) : (
                            <div className="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden p-6 md:p-8 space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-gray-400 uppercase ml-1">Tiêu đề chính</label>
                                        <input type="text" value={title} onChange={(e) => setTitle(e.target.value)} placeholder="Nhập tiêu đề..." className="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-semibold" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-gray-400 uppercase ml-1">Tiêu đề phụ</label>
                                        <input type="text" value={subTitle} onChange={(e) => setSubTitle(e.target.value)} placeholder="Mô tả ngắn..." className="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <label className="text-xs font-bold text-gray-400 uppercase ml-1">Thêm nhiệm vụ</label>
                                    <div className="flex flex-wrap gap-3 relative">
                                        
                                        {/* Nút YouTube có Menu Dropdown */}
                                        <div className="relative">
                                            <PlatformBtn color="bg-red-600" onClick={() => setYtMenuOpen(!ytMenuOpen)} icon={<Youtube className="w-5 h-5"/>} label="YouTube" hasDropdown />
                                            {ytMenuOpen && (
                                                <div className="absolute top-12 left-0 w-64 bg-white rounded-xl shadow-2xl border p-2 z-50 dropdown-enter grid grid-cols-1 gap-1">
                                                    <div className="px-3 py-2 text-[10px] font-bold text-gray-400 uppercase tracking-wider">Chọn hành động</div>
                                                    <YtOption onClick={() => addYtTask('sub1')} icon={<Youtube className="w-4 h-4 text-red-600"/>} label="Đăng Ký 1" />
                                                    <YtOption onClick={() => addYtTask('sub2')} icon={<Bell className="w-4 h-4 text-red-600"/>} label="Đăng Ký 2 (Chuông)" />
                                                    <div className="h-px bg-gray-100 my-1"></div>
                                                    <YtOption onClick={() => addYtTask('like1')} icon={<ThumbsUp className="w-4 h-4 text-blue-600"/>} label="Thích 1 (Like)" />
                                                    <YtOption onClick={() => addYtTask('like2')} icon={<Heart className="w-4 h-4 text-red-500"/>} label="Thích 2 (Tim)" />
                                                    <div className="h-px bg-gray-100 my-1"></div>
                                                    <YtOption onClick={() => addYtTask('comment1')} icon={<MessageCircle className="w-4 h-4 text-green-600"/>} label="Bình luận 1" />
                                                    <YtOption onClick={() => addYtTask('comment2')} icon={<MessageSquare className="w-4 h-4 text-green-600"/>} label="Bình luận 2" />
                                                </div>
                                            )}
                                            {ytMenuOpen && <div className="fixed inset-0 z-40" onClick={() => setYtMenuOpen(false)}></div>}
                                        </div>

                                        <PlatformBtn color="bg-sky-500" onClick={() => addSimpleTask('telegram')} icon={<Send className="w-5 h-5"/>} label="Telegram" />
                                        <PlatformBtn color="bg-black" onClick={() => addSimpleTask('tiktok')} icon={<TikTokIcon />} label="TikTok" />
                                        <PlatformBtn color="bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-500" onClick={() => addSimpleTask('instagram')} icon={<Instagram className="w-5 h-5"/>} label="Instagram" />
                                        <PlatformBtn color="bg-blue-600" onClick={() => addSimpleTask('facebook')} icon={<Facebook className="w-5 h-5"/>} label="Facebook" />
                                        <PlatformBtn color="bg-blue-500" onClick={() => addSimpleTask('zalo')} icon={<ZaloIcon />} label="Zalo" />
                                        <PlatformBtn color="bg-indigo-500" onClick={() => addSimpleTask('discord')} icon={<DiscordIcon />} label="Discord" />
                                    </div>
                                </div>

                                {tasks.length > 0 && (
                                    <div className="space-y-3 bg-gray-50 p-4 rounded-2xl border border-dashed border-gray-300">
                                        {tasks.map((task, index) => (
                                            <div key={task.id} className="flex gap-2 items-start bg-white p-3 rounded-xl border shadow-sm">
                                                <div className={`p-2 rounded-lg text-white mt-1 shrink-0 ${getTaskColor(task.platform, task.actionType)}`}>
                                                    {getTaskIcon(task.platform, task.actionType, "w-4 h-4")}
                                                </div>
                                                <div className="flex-1 space-y-2">
                                                    <input type="text" value={task.label} onChange={(e) => updateTask(task.id, 'label', e.target.value)} className="w-full text-sm font-bold border-b border-gray-100 pb-1 outline-none focus:border-blue-500" />
                                                    <input type="url" value={task.url} onChange={(e) => updateTask(task.id, 'url', e.target.value)} placeholder={task.placeholder} className="w-full text-xs bg-gray-50 p-2 rounded border outline-none focus:ring-1 focus:ring-blue-500" />
                                                </div>
                                                <button onClick={() => removeTask(task.id)} className="text-gray-400 hover:text-red-500 p-2"><div className="w-4 h-4 rotate-45"><Plus/></div></button>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                <div className="grid grid-cols-3 gap-2 md:gap-4">
                                    <BigTabButton icon={<Settings className="w-5 h-5"/>} label="Tuỳ chỉnh" color="bg-purple-100 text-purple-600" />
                                    <BigTabButton icon={<Target className="w-5 h-5"/>} label="Điểm đến" color="bg-green-100 text-green-700 border-2 border-green-500" active />
                                    <BigTabButton icon={<Zap className="w-5 h-5"/>} label="Nâng cao" color="bg-indigo-100 text-indigo-600" />
                                </div>

                                <div className="bg-green-50/50 p-6 rounded-2xl border border-green-100 space-y-4">
                                    <div className="flex items-center gap-2 mb-2"><span className="bg-green-500 text-white text-[10px] font-bold px-2 py-1 rounded">ĐIỂM ĐẾN</span></div>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div className="md:col-span-1">
                                            <label className="text-xs font-bold text-gray-500 mb-1 block">Tên nút</label>
                                            <input value={destName} onChange={(e) => setDestName(e.target.value)} placeholder="Mở khoá Link" className="w-full p-3 rounded-xl border border-green-200 focus:outline-none focus:border-green-500" />
                                        </div>
                                        <div className="md:col-span-2 relative">
                                            <label className="text-xs font-bold text-gray-500 mb-1 block">Liên kết đích</label>
                                            <div className="relative">
                                                <LinkIcon className="absolute left-3 top-3.5 w-5 h-5 text-green-600 opacity-50" />
                                                <input value={destUrl} onChange={(e) => setDestUrl(e.target.value)} placeholder="https://..." className="w-full p-3 pl-10 rounded-xl border border-green-200 focus:outline-none focus:border-green-500 font-medium text-green-800" />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex gap-4 pt-4">
                                    <button onClick={handleCreate} disabled={loading} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 active:scale-95 transition-all disabled:opacity-70 flex justify-center items-center gap-2">
                                        {loading ? <Loader2 className="animate-spin" /> : 'TẠO LIÊN KẾT'}
                                    </button>
                                    <button onClick={resetForm} className="px-8 border-2 border-gray-200 text-gray-500 font-bold rounded-xl hover:bg-gray-50 transition-colors">ĐẶT LẠI</button>
                                </div>
                            </div>
                        )}
                        <p className="text-center text-xs text-gray-400 mt-8 font-medium">© 2025 Link4Sub Pro. All rights reserved.</p>
                    </div>
                </div>
            );
        };

        const PlatformBtn = ({ color, icon, onClick, label, hasDropdown }) => (
            <button onClick={onClick} className={`${color} text-white pl-3 pr-4 py-2 rounded-full flex items-center gap-2 hover:opacity-90 active:scale-95 transition-all shadow-sm relative`}>
                {icon} <span className="text-xs font-bold hidden md:inline-block">{label}</span>
                <div className="bg-white/20 rounded-full p-0.5 ml-1">
                    {hasDropdown ? <ChevronDown className="w-3 h-3" /> : <Plus className="w-3 h-3" />}
                </div>
            </button>
        );

        const YtOption = ({ onClick, icon, label }) => (
            <button onClick={onClick} className="flex items-center gap-3 w-full p-3 hover:bg-gray-50 rounded-lg transition-colors text-left group">
                <div className="bg-gray-100 p-2 rounded-full group-hover:bg-white group-hover:shadow-sm transition-all">{icon}</div>
                <span className="text-xs font-bold text-gray-700">{label}</span>
            </button>
        );

        const BigTabButton = ({ icon, label, color, active }) => (
            <button className={`flex flex-col items-center justify-center p-4 rounded-2xl gap-2 transition-all ${color} ${active ? 'shadow-md scale-105' : 'opacity-70 hover:opacity-100'}`}>
                {icon} <span className="text-xs font-bold uppercase">{label}</span>
            </button>
        );

        // 2. GUEST VIEW
        const GuestView = ({ linkId }) => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');
            const [completedTasks, setCompletedTasks] = useState(new Set());
            const [checking, setChecking] = useState(null);

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const docRef = doc(db, "links", linkId);
                        const docSnap = await getDoc(docRef);
                        if (docSnap.exists() && docSnap.data().isActive) {
                            setData(docSnap.data());
                            updateDoc(docRef, { views: increment(1) });
                        } else setError("Liên kết không tồn tại hoặc đã bị xoá.");
                    } catch (err) { setError("Lỗi tải trang."); } finally { setLoading(false); }
                };
                fetchData();
            }, [linkId]);

            const handleTaskClick = (index, url) => {
                if (completedTasks.has(index)) return;
                window.open(url, '_blank');
                setChecking(index);
                setTimeout(() => {
                    setCompletedTasks(prev => new Set(prev).add(index));
                    setChecking(null);
                }, 5000);
            };

            const isAllDone = data && data.tasks && completedTasks.size === data.tasks.length;
            if (loading) return <div className="min-h-screen flex items-center justify-center bg-gray-50"><Loader2 className="w-10 h-10 text-blue-600 animate-spin" /></div>;
            if (error) return <div className="min-h-screen flex items-center justify-center bg-gray-50"><div className="bg-white p-8 rounded-2xl shadow-xl text-center"><Lock className="w-8 h-8 mx-auto text-red-500 mb-4"/><p>{error}</p></div></div>;

            return (
                <div className="min-h-screen bg-[#F0F2F5] flex flex-col items-center py-8 px-4 font-sans">
                    <div className="w-full max-w-[480px] bg-white rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.08)] overflow-hidden">
                        <div className="p-8 text-center border-b border-gray-50 pb-6">
                            <h1 className="text-2xl font-black text-gray-800 mb-2 uppercase leading-tight">{data.title}</h1>
                            <p className="text-sm font-medium text-gray-500">{data.subTitle || "Hoàn thành nhiệm vụ để mở khoá"}</p>
                        </div>
                        <div className="px-8 pb-2">
                            <div className="flex justify-between text-xs font-bold text-gray-400 mb-2 uppercase"><span>Tiến trình</span><span>{completedTasks.size}/{data.tasks.length}</span></div>
                            <div className="h-2 w-full bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-blue-600 transition-all duration-500 ease-out rounded-full" style={{ width: `${(completedTasks.size / data.tasks.length) * 100}%` }}></div></div>
                        </div>
                        <div className="p-6 space-y-4">
                            {data.tasks.map((task, index) => {
                                const isCompleted = completedTasks.has(index);
                                const isChecking = checking === index;
                                return (
                                    <button key={index} onClick={() => handleTaskClick(index, task.url)} disabled={isCompleted || isChecking} className={`w-full relative group transition-all duration-200 ${isCompleted ? 'opacity-100' : 'hover:scale-[1.02] active:scale-[0.98]'}`}>
                                        <div className={`p-4 rounded-2xl border-2 flex items-center justify-between ${isCompleted ? 'bg-green-50 border-green-200' : isChecking ? 'bg-blue-50 border-blue-200' : 'bg-white border-gray-100 shadow-sm'}`}>
                                            <div className="flex items-center gap-4">
                                                <div className={`w-12 h-12 rounded-xl flex items-center justify-center shadow-sm ${isCompleted ? 'bg-green-500 text-white' : getTaskColor(task.platform, task.actionType) + " text-white"}`}>
                                                    {isCompleted ? <CheckCircle2 className="w-6 h-6" /> : isChecking ? <Loader2 className="w-5 h-5 animate-spin text-blue-600" /> : getTaskIcon(task.platform, task.actionType, "w-6 h-6")}
                                                </div>
                                                <div className="text-left">
                                                    <p className="text-[10px] font-black uppercase tracking-wider text-gray-400 mb-0.5">Bước {index + 1}</p>
                                                    <h3 className={`font-bold text-[15px] ${isCompleted ? 'text-green-700' : 'text-gray-700'}`}>{isChecking ? 'Đang kiểm tra...' : task.label}</h3>
                                                </div>
                                            </div>
                                            {!isCompleted && !isChecking && <div className="bg-gray-50 p-2 rounded-lg group-hover:bg-blue-50 text-gray-300 group-hover:text-blue-500"><ArrowRight className="w-5 h-5" /></div>}
                                        </div>
                                    </button>
                                );
                            })}
                        </div>
                        <div className="p-6 pt-2 pb-8">
                            <button disabled={!isAllDone} onClick={() => isAllDone && window.open(data.destUrl, '_self')} className={`w-full py-5 rounded-2xl font-black uppercase text-sm tracking-wide shadow-xl transition-all flex items-center justify-center gap-3 ${isAllDone ? 'bg-green-500 text-white shadow-green-200 hover:bg-green-600 hover:scale-[1.02] animate-pulse cursor-pointer' : 'bg-gray-100 text-gray-400 border-2 border-gray-100 cursor-not-allowed'}`}>
                                {isAllDone ? <><Unlock className="w-5 h-5" /><span>{data.destName || "Mở liên kết"}</span></> : <><Lock className="w-4 h-4" /><span>Đang khoá</span></>}
                            </button>
                        </div>
                    </div>
                    <div className="mt-8 text-center space-y-2 opacity-60"><p className="text-xs font-bold text-gray-500">Created with Link4Sub</p><p className="text-[10px] text-gray-400">© 2025 Link4Sub. All Rights Reserved.</p></div>
                </div>
            );
        };

        const AuthView = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const handleLogin = (e) => { e.preventDefault(); signInWithEmailAndPassword(auth, email, password).catch(err => alert("Lỗi đăng nhập: " + err.message)); }
            return (
                <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4 font-sans">
                    <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm">
                        <h1 className="text-2xl font-black text-center text-blue-600 mb-8">ADMIN LOGIN</h1>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="email" placeholder="Email" className="w-full p-4 rounded-xl bg-gray-50 border focus:border-blue-500 outline-none" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" placeholder="Password" className="w-full p-4 rounded-xl bg-gray-50 border focus:border-blue-500 outline-none" value={password} onChange={e => setPassword(e.target.value)} />
                            <button type="submit" className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all">ĐĂNG NHẬP</button>
                        </form>
                    </div>
                </div>
            )
        }

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [mode, setMode] = useState('loading');
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get('id')) { setMode('guest'); setLoading(false); return; }
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => { setUser(currentUser); setMode(currentUser ? 'admin' : 'auth'); setLoading(false); });
                return () => unsubscribe();
            }, []);
            if (loading) return <div className="h-screen flex items-center justify-center"><Loader2 className="animate-spin text-blue-600"/></div>;
            if (mode === 'guest') return <GuestView linkId={new URLSearchParams(window.location.search).get('id')} />;
            if (mode === 'admin') return <AdminView user={user} onLogout={() => signOut(auth)} />;
            return <AuthView />;
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link4Sub Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel để biên dịch JSX trong trình duyệt -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Style bổ sung cho Animation -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        
        // Import Firebase từ CDN Google
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, getDoc, doc, updateDoc, 
            serverTimestamp, increment 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { 
            getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, 
            signInAnonymously 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Import Lucide Icons từ CDN
        import { 
            Plus, Link as LinkIcon, Lock, Unlock, CheckCircle2, 
            Settings, Zap, Target, Youtube, Facebook, Twitter, 
            Instagram, MessageCircle, Send, ArrowRight, Loader2, Copy 
        } from 'https://esm.sh/lucide-react@0.294.0';

        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCMYvnDTyzfBIAFTuB9VLPYN-YiFtNov6c", 
            authDomain: "linksubproject.firebaseapp.com",
            projectId: "linksubproject",
            storageBucket: "linksubproject.firebasestorage.app",
            messagingSenderId: "899237330148",
            appId: "1:899237330148:web:13bf3cf081f1cb9dc808f1"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- ICONS & ASSETS (SVG Components) ---
        const TikTokIcon = () => (
            <svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>
        );

        const ZaloIcon = () => (
            <span className="font-black text-xs tracking-tighter">ZALO</span>
        );

        const DiscordIcon = () => (
            <svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.086 2.157 2.419 0 1.334-.956 2.42-2.157 2.42zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.086 2.157 2.419 0 1.334-.946 2.42-2.157 2.42z"/></svg>
        );

        // --- COMPONENTS ---

        // 1. ADMIN VIEW
        const AdminView = ({ user, onLogout }) => {
            const [loading, setLoading] = useState(false);
            const [createdLink, setCreatedLink] = useState(null);
            
            // Form State
            const [title, setTitle] = useState('');
            const [subTitle, setSubTitle] = useState('');
            const [destUrl, setDestUrl] = useState('');
            const [destName, setDestName] = useState('');
            const [tasks, setTasks] = useState([]);

            const addTask = (platform) => {
                let label = '';
                let icon = '';
                let placeholder = '';

                switch(platform) {
                    case 'youtube': label = 'Đăng ký kênh YouTube'; icon = 'youtube'; placeholder = 'Link kênh...'; break;
                    case 'telegram': label = 'Tham gia Telegram'; icon = 'telegram'; placeholder = 'Link nhóm...'; break;
                    case 'tiktok': label = 'Follow TikTok'; icon = 'tiktok'; placeholder = 'Link profile...'; break;
                    case 'facebook': label = 'Like Fanpage'; icon = 'facebook'; placeholder = 'Link page...'; break;
                    case 'instagram': label = 'Follow Instagram'; icon = 'instagram'; placeholder = 'Link profile...'; break;
                    case 'discord': label = 'Tham gia Discord'; icon = 'discord'; placeholder = 'Invite link...'; break;
                    default: label = 'Truy cập liên kết'; icon = 'link'; placeholder = 'https://...';
                }

                setTasks([...tasks, { platform, label, url: '', icon, placeholder, id: Date.now() }]);
            };

            const removeTask = (id) => {
                setTasks(tasks.filter(t => t.id !== id));
            };

            const updateTask = (id, field, value) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, [field]: value } : t));
            };

            const handleCreate = async () => {
                if (!title || !destUrl || tasks.length === 0) {
                    alert("Vui lòng nhập tiêu đề, link đích và ít nhất 1 nhiệm vụ!");
                    return;
                }

                setLoading(true);
                try {
                    const docRef = await addDoc(collection(db, "links"), {
                        title,
                        subTitle,
                        destUrl,
                        destName: destName || "Liên kết mở khóa",
                        tasks: tasks.map(({id, ...rest}) => rest), // Remove temp ID
                        createdAt: serverTimestamp(),
                        creatorId: user.uid,
                        isActive: true,
                        views: 0
                    });
                    
                    const link = `${window.location.origin}${window.location.pathname}?id=${docRef.id}`;
                    setCreatedLink(link);
                } catch (error) {
                    console.error("Error:", error);
                    alert("Có lỗi xảy ra: " + error.message);
                } finally {
                    setLoading(false);
                }
            };

            const resetForm = () => {
                setTitle('');
                setSubTitle('');
                setDestUrl('');
                setDestName('');
                setTasks([]);
                setCreatedLink(null);
            };

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 font-sans">
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-8">
                    <div className="flex items-center gap-2">
                        <div className="bg-blue-600 p-2 rounded-lg">
                        <LinkIcon className="text-white w-5 h-5" />
                        </div>
                        <h1 className="text-2xl font-black text-gray-800 tracking-tight">Link4Sub<span className="text-blue-600">Pro</span></h1>
                    </div>
                    <button onClick={onLogout} className="text-sm font-semibold text-gray-500 hover:text-red-500">Đăng xuất</button>
                    </div>

                    {createdLink ? (
                    <div className="bg-white rounded-3xl p-8 shadow-xl border border-green-100 text-center animate-in fade-in zoom-in duration-300">
                        <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                        <CheckCircle2 className="w-10 h-10 text-green-600" />
                        </div>
                        <h2 className="text-2xl font-bold text-gray-800 mb-2">Liên kết đã sẵn sàng!</h2>
                        <p className="text-gray-500 mb-6">Chia sẻ liên kết này cho người dùng của bạn</p>
                        
                        <div className="flex gap-2 max-w-md mx-auto bg-gray-50 p-2 rounded-xl border mb-6">
                        <input 
                            type="text" 
                            readOnly 
                            value={createdLink} 
                            className="flex-1 bg-transparent px-3 text-sm font-medium outline-none text-gray-600"
                        />
                        <button 
                            onClick={() => {
                            navigator.clipboard.writeText(createdLink);
                            alert("Đã copy!");
                            }}
                            className="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-lg transition-colors"
                        >
                            <Copy className="w-4 h-4" />
                        </button>
                        </div>
                        
                        <button onClick={resetForm} className="text-blue-600 font-bold hover:underline">Tạo liên kết mới</button>
                    </div>
                    ) : (
                    <div className="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
                        <div className="p-6 md:p-8 space-y-8">
                        
                        {/* 1. Basic Info */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="space-y-1">
                            <label className="text-xs font-bold text-gray-400 uppercase ml-1">Tiêu đề chính</label>
                            <input 
                                type="text" 
                                value={title}
                                onChange={(e) => setTitle(e.target.value)}
                                placeholder="Nhập tiêu đề.. (Ví dụ: Link Tải Game)" 
                                className="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all font-semibold"
                            />
                            </div>
                            <div className="space-y-1">
                            <label className="text-xs font-bold text-gray-400 uppercase ml-1">Tiêu đề phụ</label>
                            <input 
                                type="text" 
                                value={subTitle}
                                onChange={(e) => setSubTitle(e.target.value)}
                                placeholder="Mô tả ngắn.. (tuỳ chọn)" 
                                className="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                            />
                            </div>
                        </div>

                        {/* 2. Platform Selector */}
                        <div className="space-y-3">
                            <label className="text-xs font-bold text-gray-400 uppercase ml-1">Thêm nhiệm vụ</label>
                            <div className="flex flex-wrap gap-3">
                                <PlatformBtn color="bg-red-600" onClick={() => addTask('youtube')} icon={<Youtube className="w-5 h-5"/>} label="YouTube" />
                                <PlatformBtn color="bg-sky-500" onClick={() => addTask('telegram')} icon={<Send className="w-5 h-5"/>} label="Telegram" />
                                <PlatformBtn color="bg-black" onClick={() => addTask('tiktok')} icon={<TikTokIcon />} label="TikTok" />
                                <PlatformBtn color="bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-500" onClick={() => addTask('instagram')} icon={<Instagram className="w-5 h-5"/>} label="Instagram" />
                                <PlatformBtn color="bg-blue-600" onClick={() => addTask('facebook')} icon={<Facebook className="w-5 h-5"/>} label="Facebook" />
                                <PlatformBtn color="bg-black" onClick={() => addTask('x')} icon={<Twitter className="w-5 h-5"/>} label="X (Twitter)" />
                                <PlatformBtn color="bg-blue-500" onClick={() => addTask('zalo')} icon={<ZaloIcon />} label="Zalo" />
                                <PlatformBtn color="bg-indigo-500" onClick={() => addTask('discord')} icon={<DiscordIcon />} label="Discord" />
                            </div>
                        </div>

                        {/* Task List (Dynamic) */}
                        {tasks.length > 0 && (
                            <div className="space-y-3 bg-gray-50 p-4 rounded-2xl border border-dashed border-gray-300">
                            {tasks.map((task, index) => (
                                <div key={task.id} className="flex gap-2 items-start bg-white p-3 rounded-xl border shadow-sm">
                                <div className={`p-2 rounded-lg text-white mt-1 shrink-0 
                                    ${task.platform === 'youtube' ? 'bg-red-600' : 
                                        task.platform === 'telegram' ? 'bg-sky-500' : 
                                        task.platform === 'facebook' ? 'bg-blue-600' : 'bg-gray-800'}`}>
                                    {task.platform === 'youtube' && <Youtube className="w-4 h-4"/>}
                                    {task.platform === 'telegram' && <Send className="w-4 h-4"/>}
                                    {!['youtube','telegram'].includes(task.platform) && <LinkIcon className="w-4 h-4"/>}
                                </div>
                                <div className="flex-1 space-y-2">
                                    <input 
                                        type="text" 
                                        value={task.label}
                                        onChange={(e) => updateTask(task.id, 'label', e.target.value)}
                                        className="w-full text-sm font-bold border-b border-gray-100 pb-1 outline-none focus:border-blue-500"
                                    />
                                    <input 
                                        type="url" 
                                        value={task.url}
                                        onChange={(e) => updateTask(task.id, 'url', e.target.value)}
                                        placeholder={task.placeholder}
                                        className="w-full text-xs bg-gray-50 p-2 rounded border outline-none focus:ring-1 focus:ring-blue-500"
                                    />
                                </div>
                                <button onClick={() => removeTask(task.id)} className="text-gray-400 hover:text-red-500 p-2"><div className="w-4 h-4 rotate-45"><Plus/></div></button>
                                </div>
                            ))}
                            </div>
                        )}

                        {/* 3. Big Tabs */}
                        <div className="grid grid-cols-3 gap-2 md:gap-4">
                            <BigTabButton icon={<Settings className="w-5 h-5"/>} label="Tuỳ chỉnh" color="bg-purple-100 text-purple-600" />
                            <BigTabButton icon={<Target className="w-5 h-5"/>} label="Điểm đến" color="bg-green-100 text-green-700 border-2 border-green-500" active />
                            <BigTabButton icon={<Zap className="w-5 h-5"/>} label="Nâng cao" color="bg-indigo-100 text-indigo-600" />
                        </div>

                        {/* 4. Destination Section */}
                        <div className="bg-green-50/50 p-6 rounded-2xl border border-green-100 space-y-4">
                            <div className="flex items-center gap-2 mb-2">
                                <span className="bg-green-500 text-white text-[10px] font-bold px-2 py-1 rounded">ĐIỂM ĐẾN #1</span>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="md:col-span-1">
                                <label className="text-xs font-bold text-gray-500 mb-1 block">Tên nút (Tuỳ chọn)</label>
                                <input 
                                    value={destName}
                                    onChange={(e) => setDestName(e.target.value)}
                                    placeholder="Mở khoá Link" 
                                    className="w-full p-3 rounded-xl border border-green-200 focus:outline-none focus:border-green-500" 
                                />
                                </div>
                                <div className="md:col-span-2 relative">
                                <label className="text-xs font-bold text-gray-500 mb-1 block">Liên kết đích (Bắt buộc)</label>
                                <div className="relative">
                                    <LinkIcon className="absolute left-3 top-3.5 w-5 h-5 text-green-600 opacity-50" />
                                    <input 
                                    value={destUrl}
                                    onChange={(e) => setDestUrl(e.target.value)}
                                    placeholder="https://drive.google.com/file/..." 
                                    className="w-full p-3 pl-10 rounded-xl border border-green-200 focus:outline-none focus:border-green-500 font-medium text-green-800" 
                                    />
                                </div>
                                </div>
                            </div>
                        </div>

                        {/* 5. Actions */}
                        <div className="flex gap-4 pt-4">
                            <button 
                            onClick={handleCreate} 
                            disabled={loading}
                            className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 active:scale-95 transition-all disabled:opacity-70 flex justify-center items-center gap-2"
                            >
                            {loading ? <Loader2 className="animate-spin" /> : 'TẠO LIÊN KẾT'}
                            </button>
                            <button 
                            onClick={resetForm}
                            className="px-8 border-2 border-gray-200 text-gray-500 font-bold rounded-xl hover:bg-gray-50 transition-colors"
                            >
                            ĐẶT LẠI
                            </button>
                        </div>

                        </div>
                    </div>
                    )}
                    
                    <p className="text-center text-xs text-gray-400 mt-8 font-medium">© 2025 Link4Sub Pro. All rights reserved.</p>
                </div>
                </div>
            );
        };

        const PlatformBtn = ({ color, icon, onClick, label }) => (
            <button 
                onClick={onClick}
                className={`${color} text-white pl-3 pr-4 py-2 rounded-full flex items-center gap-2 hover:opacity-90 active:scale-95 transition-all shadow-sm group`}
            >
                {icon}
                <span className="text-xs font-bold hidden md:inline-block">{label}</span>
                <div className="bg-white/20 rounded-full p-0.5 ml-1">
                <Plus className="w-3 h-3" />
                </div>
            </button>
        );

        const BigTabButton = ({ icon, label, color, active }) => (
            <button className={`flex flex-col items-center justify-center p-4 rounded-2xl gap-2 transition-all ${color} ${active ? 'shadow-md scale-105' : 'opacity-70 hover:opacity-100'}`}>
                {icon}
                <span className="text-xs font-bold uppercase">{label}</span>
            </button>
        );


        // 2. GUEST VIEW
        const GuestView = ({ linkId }) => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');
            const [completedTasks, setCompletedTasks] = useState(new Set());
            const [checking, setChecking] = useState(null);

            useEffect(() => {
                const fetchData = async () => {
                try {
                    const docRef = doc(db, "links", linkId);
                    const docSnap = await getDoc(docRef);
                    
                    if (docSnap.exists() && docSnap.data().isActive) {
                    setData(docSnap.data());
                    // Increment view
                    updateDoc(docRef, { views: increment(1) });
                    } else {
                    setError("Liên kết không tồn tại hoặc đã bị xoá.");
                    }
                } catch (err) {
                    setError("Lỗi tải trang.");
                } finally {
                    setLoading(false);
                }
                };
                fetchData();
            }, [linkId]);

            const handleTaskClick = (index, url) => {
                if (completedTasks.has(index)) return;
                
                // Check if previous tasks are done (sequential unlock)
                // if (index > 0 && !completedTasks.has(index - 1)) {
                //   alert("Vui lòng hoàn thành nhiệm vụ trước đó!");
                //   return;
                // }

                window.open(url, '_blank');
                setChecking(index);

                // Simulate verification
                setTimeout(() => {
                setCompletedTasks(prev => new Set(prev).add(index));
                setChecking(null);
                }, 5000); // 5 seconds delay
            };

            const isAllDone = data && data.tasks && completedTasks.size === data.tasks.length;

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-gray-50">
                <Loader2 className="w-10 h-10 text-blue-600 animate-spin" />
                </div>
            );

            if (error) return (
                <div className="min-h-screen flex items-center justify-center bg-gray-50 p-4">
                <div className="bg-white p-8 rounded-2xl shadow-xl text-center max-w-sm w-full">
                    <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                        <Lock className="w-8 h-8" />
                    </div>
                    <h2 className="text-xl font-bold text-gray-800 mb-2">Không khả dụng</h2>
                    <p className="text-gray-500 text-sm">{error}</p>
                </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#F0F2F5] flex flex-col items-center py-8 px-4 font-sans">
                
                {/* Main Card */}
                <div className="w-full max-w-[480px] bg-white rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.08)] overflow-hidden">
                    
                    {/* Header Section */}
                    <div className="p-8 text-center border-b border-gray-50 pb-6">
                    <h1 className="text-2xl font-black text-gray-800 mb-2 tracking-tight uppercase leading-tight">
                        {data.title}
                    </h1>
                    <p className="text-sm font-medium text-gray-500">
                        {data.subTitle || "Hoàn thành các bước bên dưới để mở khoá"}
                    </p>
                    </div>

                    {/* Progress Section */}
                    <div className="px-8 pb-2">
                    <div className="flex justify-between text-xs font-bold text-gray-400 mb-2 uppercase tracking-wide">
                        <span>Tiến trình mở khoá</span>
                        <span>{completedTasks.size}/{data.tasks.length}</span>
                    </div>
                    <div className="h-2 w-full bg-gray-100 rounded-full overflow-hidden">
                        <div 
                            className="h-full bg-blue-600 transition-all duration-500 ease-out rounded-full"
                            style={{ width: `${(completedTasks.size / data.tasks.length) * 100}%` }}
                        ></div>
                    </div>
                    </div>

                    {/* Tasks List */}
                    <div className="p-6 space-y-4">
                    {data.tasks.map((task, index) => {
                        const isCompleted = completedTasks.has(index);
                        const isChecking = checking === index;
                        
                        // Platform Styles
                        let iconBg = 'bg-gray-100 text-gray-600';
                        let icon = <LinkIcon className="w-5 h-5" />;
                        
                        if (task.platform === 'youtube') { iconBg = 'bg-red-600 text-white'; icon = <Youtube className="w-5 h-5" />; }
                        else if (task.platform === 'telegram') { iconBg = 'bg-sky-500 text-white'; icon = <Send className="w-5 h-5" />; }
                        else if (task.platform === 'facebook') { iconBg = 'bg-blue-600 text-white'; icon = <Facebook className="w-5 h-5" />; }
                        else if (task.platform === 'tiktok') { iconBg = 'bg-black text-white'; icon = <TikTokIcon />; }

                        return (
                        <button
                            key={index}
                            onClick={() => handleTaskClick(index, task.url)}
                            disabled={isCompleted || isChecking}
                            className={`w-full relative group transition-all duration-200
                            ${isCompleted ? 'opacity-100' : 'hover:scale-[1.02] active:scale-[0.98]'}
                            `}
                        >
                            <div className={`p-4 rounded-2xl border-2 flex items-center justify-between
                            ${isCompleted 
                                ? 'bg-green-50 border-green-200' 
                                : isChecking 
                                ? 'bg-blue-50 border-blue-200'
                                : 'bg-white border-gray-100 shadow-sm group-hover:border-blue-100 group-hover:shadow-md'
                            }
                            `}>
                            <div className="flex items-center gap-4">
                                <div className={`w-12 h-12 rounded-xl flex items-center justify-center shadow-sm ${isCompleted ? 'bg-green-500 text-white' : iconBg}`}>
                                {isCompleted ? <CheckCircle2 className="w-6 h-6" /> : isChecking ? <Loader2 className="w-5 h-5 animate-spin text-blue-600" /> : icon}
                                </div>
                                <div className="text-left">
                                <p className="text-[10px] font-black uppercase tracking-wider text-gray-400 mb-0.5">Bước {index + 1}</p>
                                <h3 className={`font-bold text-[15px] ${isCompleted ? 'text-green-700' : 'text-gray-700'}`}>
                                    {isChecking ? 'Đang kiểm tra...' : task.label}
                                </h3>
                                </div>
                            </div>
                            
                            {!isCompleted && !isChecking && (
                                <div className="bg-gray-50 p-2 rounded-lg group-hover:bg-blue-50 text-gray-300 group-hover:text-blue-500 transition-colors">
                                <ArrowRight className="w-5 h-5" />
                                </div>
                            )}
                            </div>
                        </button>
                        );
                    })}
                    </div>

                    {/* CTA Button */}
                    <div className="p-6 pt-2 pb-8">
                    <button
                        disabled={!isAllDone}
                        onClick={() => isAllDone && window.open(data.destUrl, '_self')}
                        className={`w-full py-5 rounded-2xl font-black uppercase text-sm tracking-wide shadow-xl transition-all duration-300 flex items-center justify-center gap-3
                        ${isAllDone 
                            ? 'bg-green-500 text-white shadow-green-200 hover:bg-green-600 hover:scale-[1.02] animate-pulse cursor-pointer' 
                            : 'bg-gray-100 text-gray-400 border-2 border-gray-100 cursor-not-allowed'
                        }
                        `}
                    >
                        {isAllDone ? (
                            <>
                            <Unlock className="w-5 h-5" />
                            <span>{data.destName || "Mở liên kết"}</span>
                            </>
                        ) : (
                            <>
                            <Lock className="w-4 h-4" />
                            <span>Đang khoá</span>
                            </>
                        )}
                    </button>
                    </div>

                </div>

                {/* Footer */}
                <div className="mt-8 text-center space-y-2 opacity-60">
                    <p className="text-xs font-bold text-gray-500">Created with Link4Sub</p>
                    <p className="text-[10px] text-gray-400">© 2025 Link4Sub. All Rights Reserved.</p>
                </div>

                </div>
            );
        };


        // 3. AUTH VIEW (Simple Login)
        const AuthView = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                signInWithEmailAndPassword(auth, email, password)
                .catch(err => alert("Lỗi đăng nhập: " + err.message));
            }

            return (
                <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4 font-sans">
                <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm">
                    <h1 className="text-2xl font-black text-center text-blue-600 mb-8">ADMIN LOGIN</h1>
                    <form onSubmit={handleLogin} className="space-y-4">
                        <input 
                        type="email" 
                        placeholder="Email" 
                        className="w-full p-4 rounded-xl bg-gray-50 border focus:border-blue-500 outline-none"
                        value={email}
                        onChange={e => setEmail(e.target.value)}
                        />
                        <input 
                        type="password" 
                        placeholder="Password" 
                        className="w-full p-4 rounded-xl bg-gray-50 border focus:border-blue-500 outline-none"
                        value={password}
                        onChange={e => setPassword(e.target.value)}
                        />
                        <button type="submit" className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all">
                        ĐĂNG NHẬP
                        </button>
                    </form>
                    <div className="mt-4 text-center">
                        <span className="text-xs text-gray-400">Chưa có tài khoản? Liên hệ admin.</span>
                    </div>
                </div>
                </div>
            )
        }

        // 4. MAIN APP ROUTER
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [mode, setMode] = useState('loading'); // loading, admin, guest, auth

            useEffect(() => {
                // Check URL params for Guest View
                const params = new URLSearchParams(window.location.search);
                const linkId = params.get('id');

                if (linkId) {
                setMode('guest');
                setLoading(false);
                return;
                }

                // Auth Listener
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                setUser(currentUser);
                setMode(currentUser ? 'admin' : 'auth');
                setLoading(false);
                });

                return () => unsubscribe();
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center"><Loader2 className="animate-spin text-blue-600"/></div>;

            if (mode === 'guest') {
                const params = new URLSearchParams(window.location.search);
                return <GuestView linkId={params.get('id')} />;
            }

            if (mode === 'admin') return <AdminView user={user} onLogout={() => signOut(auth)} />;
            
            return <AuthView />;
        };

        // MOUNT APP
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>

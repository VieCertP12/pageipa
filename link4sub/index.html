<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Social Link Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6fb;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
    background:#fff;
    border-radius:14px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.form-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

label{
    font-weight:600;
    font-size:14px;
}

.input-box{
    margin-top:6px;
    display:flex;
    align-items:center;
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px 12px;
}

.input-box i{
    margin-right:8px;
    font-weight:bold;
    opacity:.6;
}

.input-box input{
    border:none;
    outline:none;
    width:100%;
    font-size:14px;
}

/* ===== Platform buttons ===== */
.platforms{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin:18px 0;
}

.platform-btn{
    padding:10px 16px;
    border-radius:8px;
    color:#fff;
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    user-select:none;
}

.platform-btn span{
    background:rgba(255,255,255,.25);
    width:22px;
    height:22px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* colors */
.youtube{background:#ff0000}
.telegram{background:#0088cc}
.tiktok{background:#000}
.instagram{background:#6b5cff}
.facebook{background:#4267B2}
.x{background:#000}
.zalo{background:#2563eb}
.discord{background:#7289da}

.big-btns{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:15px;
    margin-bottom:20px;
}

.custom{background:#8b5cf6}
.destination{background:#00c853}
.advanced{background:#3b0bdc}

/* ===== content ===== */
.platform-content{
    display:none;
}

.platform-content.active{
    display:block;
}

.actions{
    text-align:center;
    margin-top:25px;
}

.actions button{
    background:#1e40ff;
    color:#fff;
    border:none;
    padding:12px 22px;
    border-radius:8px;
    font-size:15px;
    font-weight:600;
    margin:0 6px;
    cursor:pointer;
}

@media(max-width:900px){
    .form-row,.big-btns{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="container">

    <!-- title -->
    <div class="form-row">
        <div>
            <label>Tiêu đề</label>
            <div class="input-box"><i>T</i>
                <input placeholder="Nhập tiêu đề.. (tùy chọn)">
            </div>
        </div>
        <div>
            <label>Tiêu đề phụ</label>
            <div class="input-box"><i>T</i>
                <input placeholder="Nhập tiêu đề phụ.. (tùy chọn)">
            </div>
        </div>
    </div>

    <!-- platforms -->
    <div class="platforms">
        <div class="platform-btn youtube" onclick="showPlatform('youtube')">YouTube <span>+</span></div>
        <div class="platform-btn telegram" onclick="showPlatform('telegram')">Telegram <span>+</span></div>
        <div class="platform-btn tiktok" onclick="showPlatform('tiktok')">Tiktok <span>+</span></div>
        <div class="platform-btn instagram" onclick="showPlatform('instagram')">Instagram <span>+</span></div>
        <div class="platform-btn facebook" onclick="showPlatform('facebook')">Facebook <span>+</span></div>
        <div class="platform-btn x" onclick="showPlatform('x')">X <span>+</span></div>
        <div class="platform-btn zalo" onclick="showPlatform('zalo')">Zalo <span>+</span></div>
        <div class="platform-btn discord" onclick="showPlatform('discord')">Discord <span>+</span></div>
    </div>

    <!-- big buttons -->
    <div class="big-btns">
        <div class="platform-btn custom">Tùy chỉnh <span>+</span></div>
        <div class="platform-btn destination">Điểm đến <span>+</span></div>
        <div class="platform-btn advanced">Tính năng nâng cao <span>+</span></div>
    </div>

    <!-- ===== YouTube content ===== -->
    <div id="youtube" class="platform-content active">
        <div class="form-row">
            <div>
                <label>Điểm đến #1: Tên</label>
                <div class="input-box"><i>T</i>
                    <input placeholder="Nhập tên nút.. (tùy chọn)">
                </div>
            </div>
            <div>
                <label>Điểm đến #1: Liên kết</label>
                <div class="input-box"><i>🔗</i>
                    <input placeholder="https://youtube.com/...">
                </div>
            </div>
        </div>
    </div>

    <!-- ===== Telegram content ===== -->
    <div id="telegram" class="platform-content">
        <div class="form-row">
            <div>
                <label>Tên kênh / nhóm</label>
                <div class="input-box"><i>@</i>
                    <input placeholder="Tên Telegram">
                </div>
            </div>
            <div>
                <label>Link Telegram</label>
                <div class="input-box"><i>🔗</i>
                    <input placeholder="https://t.me/...">
                </div>
            </div>
        </div>
    </div>

    <!-- placeholders -->
    <div id="tiktok" class="platform-content"><p>Form TikTok (tự thêm sau)</p></div>
    <div id="instagram" class="platform-content"><p>Form Instagram</p></div>
    <div id="facebook" class="platform-content"><p>Form Facebook</p></div>
    <div id="x" class="platform-content"><p>Form X</p></div>
    <div id="zalo" class="platform-content"><p>Form Zalo</p></div>
    <div id="discord" class="platform-content"><p>Form Discord</p></div>

    <div class="actions">
        <button>Tạo liên kết</button>
        <button>Đặt lại</button>
    </div>

</div>

<script>
function showPlatform(id){
    document.querySelectorAll('.platform-content')
        .forEach(el=>el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
